body:
  text: 金光明經科註敘夫玄義釋題名文句分章段法華而下惟今經例之斯實繇天台智者大師總持親證故縱三輪而評古釋今約教明觀其文燦然其義躍然如神龍滴水雨澤大千殆非真諦諸家可同日語者法師章安筆其所說詔彼來學至宋四明尊者毅然以中興為己任不忍世之毀觀銷經也乃作記而申通之拾遺棄則文義俱收闢邪謬則事理咸正有是哉法性金之為可尊可貴也法性光之為即寂即照也法性明之為大悲益物利用無際也十種三法無量法門靡不全體即真運心皆觀洵所謂翼祖明宗扶偏救弊而是經奧旨蓋已大備無餘蘊矣汰不敏從桐谿和尚授受此道研繹有年深知疏之與記廣博幽玄倘如香象截流又何憂於望涯思退也是以敬合諸祖成言仰疏經王妙義解題而約略五章釋句而折衷眾論初未敢妄加己見淆溷祖說惟後之覧者即略知廣繇註通經則佛道祖道在在游翔見知聞知重重會入無非當體金光明總一圓常真法性茲科註所繇集也夫宗天台教觀沙門釋受汰槃譚書金光明經科註目次自序卷第一經卷第一序品第一壽量品第二懺悔品第三讚歎品第四空品第五卷第二經卷第二四天品第六大辯天品第七功德天品第八堅牢地神品第九卷第三經卷第三散脂鬼神品第十正論品第十一善集品第十二鬼神品第十三授記品第十四除病品第十五卷第四經卷第四流水長者子品第十六捨身品第十七讚佛品第十八附金光明經感應記
