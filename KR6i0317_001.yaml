body:
  text: 明鹽官安國寺比丘受汰集金光明經卷第一此金光明甚深無量諸佛行處過諸菩薩所行清淨大師釋題例作五重玄義金光明為名法性為體三身常果為宗滅惡生善為用方等生酥為教相第一名者有通有別經之一字除律論外俱得其名所謂通也金光明不共他部獨在此經乃云別也應知三字別題是法非譬何以知然經敘如來游於法性定中而便唱云是金光明諸經之王蓋直指所游法性名金光明不云法性如金光明也創首標名彌為可用故法性可尊可貴當體名金寂而常照當體名光大悲益物當體稱明此之三種舉一即三全三是一非三非一而三而一不縱不橫絶思絶議是祕密藏佛所游處甚深是光之德窮法性底故無量是明之德達法性邊故此二不二是金之德法性究竟尊貴義故玄義云依文立題方為親切則此洵是法非譬明矣經者訓法訓常十界同遵三世不易之謂有翻無翻各具五義廣如法華玄云云釋名竟法性為體者體謂主質依義則以法身為體依文則以法性為體今以佛所游入法性為體無量功德共莊嚴之種種衆行而歸趣之言說問答而詮辨之類衆星之環北辰如萬流之宗東海蓋以法是軌則性乃不變不變故常一此常一法性諸佛軌則故以法性為此經之體三身常果為宗者宗即要義法性常體非果不克釋迦是果人壽量是果法果人克果法冥乎法性法性非常非無常能常能無常三身亦爾果能顯體故以是為此經之宗滅惡生善為用者用謂力用懺悔是滅惡讚歎是生善空品是導成下去例然將此勝用莊嚴果智智備體顯故即以為此經之用方等生酥為教相者教者聖人被下之言相者分別同異若五味明義則第三生酥攝若四藏明義則雜藏攝若四教明義則此經體幻即顯中空全非三藏析法拙度三乘同懺復非別圓不共之法正是通教三乘共稟不生滅法利根菩薩知常達性是通教中帶別明圓故以方等生酥為此經之教相已上玄義五重皆是經中所詮之旨大師預取解釋首題者欲令受持讀誦之人即於一題了一經大旨故也北涼三藏法師曇無讖譯北涼標其代三藏者謂經律論三各舍義理讖既以此法而自師還即以此師人故云法師蓋就其德以稱之也曇無讖者梵語此云法豐是舉其諱中印號為大神呪師譯者易義謂以東土之言翻彼西梵之語明其事也金光明經序品第一序義有三一次緒二敘述三發起居一部之初冠衆說之首次緒也敘於方將述於當益敘述也發其信心起乎聖說發起也具此三義故稱為序品者梵語跋渠此翻為品氣類同者聚在一段以品是類義故也如四法同明發起等義節為序品乃至同明讚佛之義節為讚品今雖釋序而品義貫下如是如是者舉所聞之法體也佛如法相而說阿難如聞相而傳故言如也佛如法相而解阿難如海量而受故言是也外道阿慪稱吉文乖其理故非如理異其文故非是此則文如其理故言如理如其文故言是三藏二諦各異故非如理淺故非是摩訶衍二諦相即故言如理深故言是三人同聞而各解故非如證入優劣故非是唯菩薩所聞者為如菩薩所到者為是離邊明中之文則非如出二諦外有中道則非是文字性離即是於如故言如一切法即佛法名之為是初破邪明正即三藏經如是次破異明同即通教經如是次破淺明深即別教經如是次破離明中即圓教經如是今經既是方等通被根性不同作種種說無咎觀心解者以圓三觀觀於陰等修惡全是性惡體是三德復名三諦稱諦而照觀與境冥故為如境即正觀故為是下去觀解準此應知我聞我聞者謂如是之法阿難從佛而聞也釋論云阿難與聽衆述佛遺旨親承不謬故言我聞約教應有四種我聞四種阿難云云一時一時聞持和合非異時也又衆生感法佛慈赴教機應之時也亦是諦智合一之時佛梵語佛陀此云覺者覺有三義一自覺悟生真常了惑虗妄二覺他運無緣慈度有情界三覺行圓滿即名妙覺謂能覺世間出世間常無常數非數等朗然大悟故名為佛若約教釋依一切智有丈六佛依道種智有丈六尊特佛依一切種智有法身佛三佛不得一異非一異而一異爾住王舍大城耆闍崛山住者佛是能住王舍等是所住處斑足王與千王共立舍城都五山中為大國故云王舍城耆闍崛此翻鷲頭或云靈鷲此鳥有靈知人死時故又多仙靈隱其中故觀解此之城山正托乎事相入心成觀所謂五陰為舍心王居之亦靈即神智是般若鷲即萬德即解脫山即不動是法身常為心王所觀令一切心數同入其中為觀所住處也問何不列同聞衆答說時有五說處有四耆山衆不聞信相室說信相室衆不聞夢中說夢中衆不聞夢覺已說衆非一座故闕之耳是時如來游是時者謂如來知機堪可得道時若慧眼得道智與真冥時若法眼得道智與俗冥時若佛眼得道智與中冥時佛欲履歷法性觀知衆生於何時得道故言是時也如來者十號之初約悲智則智照理與諸佛等為如慈悲與諸佛等名來約說證如三諦法相解名如如三諦法相說名來故言如來也游者游涉進入之義即是以究竟智游入法性夫所證法性能證果智義立能所體非相到何得言游耶良以慈悲導物斆我而入故言游也若令衆生食甘露味亦應言住為衆生宣說亦應言出法華云善入出住百千三昧即此義耳於無量甚深法性諸佛行處體包法界曰無量徹到三諦曰甚深此先明其體德法性者所游法也乃顯其德之體諸佛所軌不遷不變之謂三乘六道以迷性具無事用故雖軌而違如來如實照了毗盧遮那遍一切處一色一香無非中道當體廣博全體幽邃非二乘下地菩薩之所逮及故言無量甚深法性也諸佛行處者上已簡顯其體高廣今正顯佛智亦爾佛智無量甚深故行處亦無量甚深行處無量甚深故佛智亦無量甚深舉行處函顯能游蓋乃云游於諸佛行處過諸菩薩所行清淨菩薩居未及之地智之所行未能深廣故特簡之亦是舉其高位簡法性甚深也是金光明敘名之句據前釋題非從喻立乃是直名深廣法性以佛正游此之法性便即唱云是金光明諸經之王不名法性是之一字為指何耶諸經之王經王者若取文為經即三種俗諦若取理為經即三種真諦若取文理合為經即三種中道若說餘諦是經而非王若說中道是經復是王但經王是一隨緣設教名字不同華嚴云法身方等為實相般若稱佛母法華為髻珠涅槃名佛師皆是法性異名通為諸經作體今此經云無量甚深法性又云不思議智境又云安住一切法如性於一切法含受一切法則所詮外無能詮能詮外無所詮文理既合中道斯圓於九種經中而得自在故以法性為金光明之王正是經復是王也若有聞者則能思惟至西無量壽北微妙聲微妙者如來既敘金光明名經王之體此乃一經所詮祕藏其有聞者必思此義故因中性德深而難見名微不縱不橫名妙果中修德亦復如是四方四佛護持者佛唱此言意有所表四方者四門也四佛者四門果上覺智也釋迦覺智與四佛同諸佛果智冥於法性法性得顯名為法身法身不動名之為持法性常故諸佛亦常法常佛常壽命亦常常故無量信相推迹惑本四佛令其達本悟迹名之為護又四方是四諦四佛是四諦智諦智兩冥持理不失護倒不起故名護持也若於集諦達即真常名為阿閦此翻不動也次於苦諦達即真樂真樂尊重名為寶相次於道諦達畢竟淨常住慧命名無量壽次於滅諦達二我空所顯真如是祕密藏一音遍滿名微妙聲四方四佛本是心性即性為觀觀符於性成四佛名我今當說懺悔等法至滅除諸苦與無量樂懺悔等法者謂境法法性也行法懺悔讚歎也導法一切種智也此等勝法悉破三障若相資為論行資智智顯理理顯故能盡衆苦苦盡故法身顯智圓故報身顯功德無上故應身顯若圓論者一切諸法無非法界以法界智導法界行以法界行契法界境因中三法不縱不橫而修果上三身亦不縱不橫而顯雖圓別之殊俱能破之勝法也諸根不具壽命損減昔損他身分今諸根殘毀昔斷他命今壽損減經云殺生因緣得二種果報多病短命即其事也貧窮困苦諸天捨離初是外無依報次是內無福德經云有同生同名天龍輔佐之功德天發願利益之盜人無此事也又先富後貧者必是龍棄天捨也親厚鬬訟王法所加親厚者謂父母兄弟妻子六親也經言人護則人瞋法護則法壞昔侵其人今骨肉鬬訟昔毀他法今王法所加即其事也各各忿諍此應有兩句或翻者脫落或是略耳內則各各忿諍外則人人不信昔不實欺他今常被欺忿昔語無實今人無信者財物耗散昔慢財費日今多損耗昔乖樽節今墮聾騃經言嫌恨猛風吹罪心火常令熾然即其事也上直就人道中明犯五戒之報若廣約五乘明其事理持犯害命名事殺不害命名事不殺析法名理殺體法名理不殺不與取名事盜與取名事不盜如佛言曰他物莫取名法門不盜菩提無與者而取菩提是名法門盜男女身會名事淫不會名事不淫法門解者若心染法是名為淫心不染法名為不淫不見言見見言不見是事妄語未得謂得未證謂證名法門妄語若穀若草昏心眩亂者名事酒法門解者迷惑倒見名之為酒此等人天但事二乘加理菩薩猶未究竟所以根相不具壽命減少唯圓教人持事不殺又持理不殺有因緣故唯殺唯慈亦作事殺亦作理殺故能以微妙法身垂形九道隨其所宜示長短命任其所見用缺具根而化導之是為究竟持不殺戒不盜不淫不妄不飲例此可知愁憂恐怖通論見思煩惱皆有愁憂恐怖別論愁憂屬見煩惱恐怖屬愛煩惱問煩惱與報云何答報多約色惑惟在心問煩惱與業云何答任運常有是煩惱卒起決定心發動身口必牽來報者是業若爾惡星灾異都不關心云何是業障此乃外相表業將起是業責報之相即得是業障也惡星灾異衆邪蠱道變怪相續臥見惡夢晝則愁惱業將感報故其相前現惡星者別有客星也亦是五星二十八宿違其度數失其分野若熒惑亂行麻彗出是客星也灾異者風雨雪霜乖候等衆邪者人邪鬼邪法邪也蠱道者毒鬼也又言三毒是蠱變怪者詭怪也謂禽獸醜惡形聲等惡夢者心靈潛密業現其中夢見不適意事是也如上三障若能內觀法性達罪本空均生佛於自心起慈悲於法界將即障是德又何慮乎不破故於次文明其行法當淨洗浴聽是經典至專聽諸佛甚深行處前業相外彰報對不久內無行法何以禳之約其三業作三德之行以事表理也洗浴臭體擬作法身緘脣攝耳擬聽般若至心清淨擬作解脫前令洗浴內身後更勸淨外服內外相成爾前但令聽後誡令專聽鄭重緘口爾前令至心後示至心之境成其行法爾洗浴法身能禳報障攝耳緘口能禳煩惱障至心能禳業障云云是經威德能悉消除如是諸惡令其寂滅能悉消除者明三障轉也令其寂滅者三德成也三業既修金光明行成則契於三德之理修在名字觀行相似至分真位皆得名為轉障成德報轉成法身煩惱轉成般若業轉成解脫前寄事相將淺表深後明寂滅將深結淺經文繡密見之者寡護世四王將諸官屬至是上善根諸佛所讚此中正敘流通護世四王下是敘其品可解大辨者是敘其品尼連鬼母是敘功德天品同是女天故地神是敘其品大梵三十三天是敘散脂品散脂是將梵釋是主敘主即得臣將也緊那羅等是其領敘其領得其管也我今所說諸佛祕密者是敘正論善集兩品說世祕密可以治國出世祕密可以詣道故知敘兩品若得聞經者是敘鬼神品鬼神品中純明聽法功德為八部所護云云著淨衣服下兩行敘授記品三大士十千天淨心殷重淨若虗空故獲授記也若得聽聞下敘除病流水等品聞名服藥悉得病除則是善得人身復能修行布施福業是善得人道魚聞佛名善得天身天道即此意也正命是敘捨身品虎餐血肉即得解脫豈非正命也若聞懺悔下一行敘讚佛品佛有三世諸菩薩多是先佛即過去佛也又是未來佛也為此菩薩所讚即為佛所讚也金光明經壽量品第二此之品題若從信相所疑應言壽有量若從四佛釋疑應言壽無量而今不道壽有量不道壽無量直言壽量者意欲圓論三佛之壽量故不偏題蓋佛本無身無壽亦無於量隨順世間而論三身亦隨順世間而論三壽量如云壽者命也報得命根連持不斷名之為壽延促期數名之為量此應身因緣壽量也如云壽者受也境智和合共相盛受無分別智盛受無分別境無分別境盛受無分別智如函大而蓋亦大故壽是受義量者相應也境智相應故言量此報身之壽量也如云壽者久也常不變易稱之為久量者詮量也常久之壽非多數非少數非相應盡知非相應不盡知非可說非不可說無以名之彊以詮量說其長久此法身之壽量也初番為二一有量量如釋迦之壽方八十是也二量無量如彌陀之壽實是有量人天所不能測故言量無量也此量無量皆應佛所為也第二番亦二義佛以如如智稱如如境境無分別智亦無分別若境稱於智智有分別境亦有分別此知與不知皆報佛所明也第三番亦二義一者深寂不可說二以慈悲方便亦可得說此可說不可說皆法佛之法也釋此壽量雖作三身六義初番祇是明義以其明故大小長短延促數量悉現明中第二祇是光義智境函蓋體解相應色大故般若亦大以法常故諸佛亦常第三祇是金義常樂我淨說滿法界法性無所益都無一言法性無所損故下文云如深法性即於此典金光明中而得見我釋迦牟尼即其義也但信相偏疑應身之有量四佛偏舉應佛之無量斷其有量迹疑既除深達報法經家從其生圓解以立題故言壽量品意取報身壽量上冥下應上冥法性即非量非無量下應機緣能量能無量所謂舉一蔽諸耳問既稱壽量已是正宗序分何得復入耶答衆經例爾如維摩無序品序在正說中大品正說在序品中涅槃序分入正品中衆經皆然何獨惑此斯乃出集經者節品之意為四佛斷疑孤然而起其文嶄絶故引序分安壽量中品雖屬正義當序分應從義便不得齊品分割也爾時王舍城中有菩薩摩訶薩菩薩者菩名道薩名心自行此道復能化人故言摩訶薩依勝行立勝位也名曰信相信相者信家之相在似道中別判三十心圓判鐵輪位下文云見有一人似婆羅門以枹擊鼓鼓是法身擊是機動似位機興知非真擊又真似之位地地相隨如普賢行滿位鄰尊極此似則高信相稱似道者未敢判其高下也已曾供養過去無量億那由他百千諸佛供養有二義一財二法佛說百千法門隨而修學名法供養觀解一念覺了心名佛無量功德心資此覺心令轉明淨名供養佛如膏資火如食益身如禪發慧皆供養義種諸善根種善根者法性名地觀法性智名種子常以觀觀名下種久習不退名種久五善根生名增長此繇值佛故得殖種二義相成皆菩薩之德也是信相菩薩作是思惟至壽命短促方八十年繇有遠近遠繇三月唱入涅槃近繇敘述若有聞者則能思惟無上之義又云繇乎本誓擊動生疑何因何緣者通論三種皆名因而此文既略緣了相資共能顯正正當於因緣了當緣正因常恆壽命無量緣能顯理境常智亦常此因此緣皆非八十之因緣今方八十是何因何緣是故生疑也此正未達全應是法是報三身竝常是圓四德遂疑應迹定是短促方八十者世壽三品下方四十中方八十上方百二十復更念言如佛所說至饑餓衆生況餘飲食如佛所說者教詮止行二善感壽則長此金口誠言佛昔行因甚多而今果壽極少理教相違不能不惑若無此理教為虗設若其必然長壽安在有二因緣者即是止行二善十善中一一皆具不殺是止善放生是行善不盜是止善施食是行善今經互舉一邊共明止行然止行之義甚長如人天以五戒十善為命三乘人以智慧為命若遮奪此事即是斷人天命破壞三藏法即殺二乘人命毀訾事檀等即斷六度菩薩命非撥體空即斷通教菩薩命毀訾漸次是斷別教菩薩命誹謗圓融是斷圓教菩薩命亦斷佛命唯例無遮障乃名不殺百味甘漿等依報食也身肉骨髓等正報食也此皆事中施食爾經言法食法食者世間法味出世法味出世上上法味菩薩能為一切衆生作大施主授以五戒十善即人天食說三界猛火多所燒害讚歎三乘無繫解脫即授三藏食毀訾小乘敗種焦芽稱讚菩薩所行之道即授通別食設饑國人大王之膳煩惱為薪智慧為火成涅槃食令諸弟子皆悉甘嗜即授圓教食惟盡行此法乃名施食如是一一法皆具止行二善一一善皆具因緣此諸因緣感長壽果而我世尊行圓果滿云何今日方八十年己身骨髓肉血者即指法性實相為己身也釋論云持戒為皮禪定為血智慧為骨微妙善心為髓為他說戒戒能遮罪修福是施己皮說諸禪定神通變化是施己血說無著妙慧亡泯清淨其所說法皆到智地是施己骨檀忍等應是肉也說甚深法性諸佛行處不一不異絶思絶議微妙中道者是施己髓將此充足饑餓衆生況餘飲食餘飲食者即是人天二乘戒皮定血慧骨真諦之髓爾如來往昔隨他意語施權隨自意語施實皆是長壽因緣云何今日方八十也大士如是至心念佛思是義時至心者徹到心源盡心實際之謂觀心既然觀佛亦爾故言念佛正念不殺施食與法性虗空等如此之壽不應短促是為結前繇作此觀機動瑞興故言開後文句中亦科為現相之繇其室自然廣博嚴事至諸根不具即得具足別相有十者一其室廣博二其地寶嚴三妙香氛氳四高座涌出五佛坐華座六放大光明七雨諸天華八作天伎樂九皆受天樂十根缺者具此之十相約相表德作橫竪消文一竪表十地義便二橫表初地義便其室廣博竪論表初歡喜此地初開過於凡聖故以廣博表之橫論表初地智也以五陰為室嚴事即假智廣博即空智自然即中智三智一心中具足故歡喜天紺琉璃等者竪論表離垢地此地對戒戒是諸行基壇諸行莊嚴於戒故以間錯表之橫論表初地所照境天紺琉璃瑩淨明徹表真諦境雜廁間錯種種莊嚴表俗諦境猶如如來所居淨土至聖所居極尊之地表中道第一義諦境香氣竪論表明地其地對忍唯辱而忍增如煙多則香盛故以香表之橫論表初地慈悲功德稱性與拔竪高橫廣故言過諸天香遍滿一切陰入界中無不溥覆四高座竪論表𦦨地其地對精進精進督出衆行故以高座表之橫論表初地四德是祕密藏佛住其中如高座可坐也佛坐其上竪論表難勝地其地對禪禪有神通轉變大力故以佛表之橫論有四如來表初地覺四法智智與法冥如佛坐座也光明竪論表現前地其地對般若般若洞照故以光明表之橫論表初地自行化他此土他土無不畢照也天華竪論表遠行地其地對方便方便善巧觸處嚴淨故以天華表之橫論表初地四辨華雨於空如辨詮於理也作樂竪論表不動地其地對力力能利安一切如伎悅物故以作伎表之橫論表初地四攝四攝攝物如樂樂他也受樂竪論表善慧地其地對願願滿則心喜故以受樂表之橫論表初地法喜法喜澄神如受天樂根具竪論表法雲地其地對智因中衆行智慧為首智導諸行隨階而圓故以根具表之橫論表初地諸根互用耳見眼聞一根具足諸根用也初地既爾地地皆然將橫入竪無竪不橫復次十相前五表自行因果後五表化他能所即與法華十妙意同舉要言之一切世間所有利益未曾有事悉具出現前文廣意略此文略意廣一切者該十法界也世間者包三世間也未曾有者因中所無也悉具現者因圓理顯也舉要者實相是要實相既圓三千世間俱空假中何法不滿故知正表十地因成一果究竟具足爾時信相菩薩見是諸佛至恭敬合掌向諸世尊既因心疑覩瑞見佛必知聞法故歡喜至心念佛作是思惟至壽命如是方八十年夫疑情不可久處是故騰疑念如來相好光明神力說法一切功德依壽而住其壽既促衆法奚為故皆不疑但念壽短以此覆心故默騰求決也而不發言者四佛適現威尊敬重故爾默然疑既覆心不得不念爾時四佛以正遍知至思量如來壽命短促疑蓋覆心聞法不解故先止之若信相實疑宜須折止若是起教因其訓人汝今不應下正止疑有三不應一八十之壽是法界全體起應物大用故不應以定短致疑二釋尊所證法性海深不應以長短心慮測度三以信能入以智能度汝信智未具豈度量所思此三不應是約三身而成止意何以故善男子至知其齊限唯除如來此正釋三不應之意舉八衆不能量者釋法性不應也義攝菩薩若凡若聖悉不能思算也惟除如來者釋智度不應也若如如來是則能知既未如如來那忽能知以如來有無量常智能知無量常法智性既冥大用可解是釋三不應也時四如來將欲宣暢至信相菩薩摩訶薩室餘經或先集衆後現瑞此經先現瑞後集衆前後互出爾信相一人利益者少有緣若集所益處多是故集衆衆有四種一發起信相樹神等二當機聞即得道者三影響從十方遠來者是四結緣當座雖未得道作後世因緣如流水為魚說法今日得悟即其事也齊此判屬序分者文云將欲宣暢大衆雲集豈非序之明證邪序分竟爾時四佛於大衆中至所得壽量而作頌曰一切諸水可知幾滴至無有能計釋尊壽命此中正是常宗斷疑且作三意消文一對四諦二對四念處三對四德若論果壽宜對四德果不孤起故念處明因因果有本故對四諦一切諸水對集諦水體潤生如集能資長沒溺凡聖亘界內外也諸須彌山對苦諦山體結搆盤峙水上如苦報積聚為集作果繫縛界內外色心也大地微塵對道諦地能容載水陸兩途如通別道到此彼岸虗空分界對滅諦空體盡淨如滅諦滅無二十五有及滅化城涅槃也四諦理即法身四諦智即報身從體起用即應身信相但見應短不見應長四佛舉四喻喻其應長應迹尚難思算況復報法對四念處者一切諸水對受念處受能含納如海多容須彌山對身念處色相與質礙相類大地對想行念處想取行行如地容載空界對心念處心但有名如空無相若觀四念處是長壽因若四念處得道是長壽果處即法性是法身念即觀智智冥於法是報身法報非常非無常而能起用為常為無常信相但見無常不能見常四佛舉喻明其用常用既叵窮體誠難量對四德者水潤生榮對常德山能高出對我德碎地為塵對淨德空無苦受對樂德四德是果上所剋果與理冥冥於非常非無常等能起常無常等用信相但見無常無樂不見常樂四佛舉喻顯四德之用非思算所知體本報法杳然慮外統上舉應迹以彰報法要使信相聞說非但疑除惑斷增信生解言巧意深為若此也不可計劫億百千萬佛壽如是無量無邊四佛引四譬者乃是舉量以況無量量物尚非思算所知無量之法寧可圖度億百千萬此舉數法以明無數以是因緣故說二緣至無量無邊亦無齊限若作因緣者因親緣疏命是正報不殺為因食是依報施之為緣以此因緣得壽命長若作二緣者不殺是止善施食是行善如是二緣資助法性菩提之因乃會妙常此正以長釋短斷其無常之疑無常疑斷常住壽明是故汝今不應於佛無量壽命而生疑惑爾時信相菩薩摩訶薩至深心信解歡喜踊躍此疑去信生也聞壽命無量者解迹用能常能無常能常其壽無量能無常其壽八十則前疑自去矣深心信解者即於應用而悟報法本體非量非無量也踊躍者登位也歡喜者信生也別在初地圓在初住若作普賢似位釋者鄰真接極而生歡喜也說是如來壽量品時至發阿耨多羅三藐三菩提心據新經三周意即是第三當機上根初悟也時四如來忽然不現佛本為信相等一類機緣不現而現緣己利益則不還而還息化歸本故言忽然不現金光明經懺悔品第三懺悔二字乃雙舉二音梵語懺摩華言悔過今釋為四意一釋名二示處三明法四顯位第一釋名者懺者鑑也披陳三業不敢隱諱令他委鑑身被鑑而顏恧口被鑑而脣蹙心被鑑而意伏故懺名鑑也悔者廢也內懷鄙恥悔造衆非悔身則三廢悔口則四廢悔心則十廢故悔名廢也又懺者首也悔者伏也不逆為伏順從為首又懺名白法悔名黑法白法須尚黑法須捨又懺名修來悔名改往又懺名披陳衆失悔名斷相續心又懺者名慚悔者名愧慚則慚天愧則愧人故名懺悔第二示處者處是懺之所依謂一實相無別實相即罪相是文云我今為是作歸依處正甚深無量金光明法性也法性祇是諦理諦理祇是妙境諸佛所師寂滅真如祕密之藏十方衆聖安住其中如普賢觀是名大懺悔約中道為處也名莊嚴懺悔約俗諦為處也名無罪相懺悔約空為處也若三種差別此是歷別論處即一而三即三而一乃稱圓妙得此處者標心進行罪無不滅德無不顯故須識懺悔處也第三明法者乃有三種一作法懺謂身口所作一依法度二取相懺謂定心運想相起為期三無生懺謂了我心自空罪福無主觀業實相見罪本源法界圓融真如清淨法雖三種行在一時無生是正二為助緣正助合行如膏益明證理彌速今文具有著淨潔衣專聽是經又七日七夜朝暮淨心等即作法也於其坐處得見彌勒文殊普賢即取相也五陰舍宅觀悉空寂本無有生亦無和合即無生也一往初破報障次破業障三破煩惱障故明懺悔法也第四顯位者其位甚長其義極廣凡夫鄙濁三障日深二乘捨離但除界內菩薩分破即至等覺猶未究竟故知位位橫論各有三障煩惱頭數結業流類苦報等差皆須懺悔故復顯位也如上四義正欲行人一一了知如法進修滅除諸惡故專以懺悔當品顯經力用耳爾時信相菩薩即於其夜夢見金鼓其狀姝大夢者是入如夢三昧也示能觀智法性即金鼓金鼓體圓空鳴即是三德姝者勝義深義大者廣義無量義如上文游於無量甚深法性委論應言圓姝大空姝大嗚姝大一一甚深無量此即夢中所覩法身觀一而見三佛也其明普照喻如日光光是智慧智與法性體冥克成大果體圓空鳴姝大光圓空鳴亦姝大此即夢中所覩報身佛一佛而三也復於光中得見十方至眷屬圍繞而為說法光從鼓出遍照十方用從體起應周法界與機緣同事也座是所安之理法也智稱此理故佛坐其上報也大衆圍繞所應之機應也此即夢中所覩應佛即一而論三也三佛既具三義乃顯法法具三略則十種廣則一切莫不可尊可重寂而常照能多利益是故此經名金光明思之思之見有一似婆羅門以枹擊鼓出大音聲其聲演說懺悔偈頌鼓是法身擊是機智婆羅門是淨行似是鄰真鄰真之人以似解淨智和合法身甘露相應能以妙音遍三千界滅苦生樂斯乃法界大用起教利益衆生故有懺法耳時信相菩薩從夢寤已至過夜至旦出王舍城夢者橫論入觀為夜夢出觀如過夜至旦竪論三十心惑障未遣如夢登地斷惑如過夜至旦出王舍城者表出因位往耆闍山者表向果地山是佛居信相在城故出此往彼表從因趣果爾時亦有無量無邊至往耆闍崛山至於佛所至佛所已頂禮佛足至瞻仰尊顏目不暫捨頂禮是身敬瞻仰是意敬說夢是口敬禮畢右繞表戀慕以其夢中所見金鼓及懺悔偈向如來說昨夜所夢至心憶持夢見金鼓妙色晃耀其光大盛明踰於日遍照十方恆沙世界又因此光得見諸佛至無量大衆圍繞說法即長行中三身意入觀所觀之境也見婆羅門擊是金鼓其鼓音中說如是偈上文所表三身雖是佛法既與心法及衆生法無差別故故為信相心性之境今於夢中自覩其觀智之機扣擊法身起應機用說懺悔偈斯乃信相同於如來起經力用是大金鼓所出妙音至能除衆生諸惱所逼前二行滅果諸有者三有也後一行滅因諸惱三惑也斷衆怖畏令得無懼至定及助道猶如大海前二行出世間果斷衆怖者離五怖謂惡道怖惡名怖死怖不活怖大衆威德怖得無所畏者有四一一切智無畏二漏盡無畏三說障道無畏四說盡苦道無畏後一行出世間因定是正道助道即事度等對治行也是鼓所出如是妙音至貪瞋癡等悉令寂滅前一行半自行備後二行半化他備若有衆生處在地獄至亦聞無上微妙之言以戒緩故處於地獄以乘急故聞金鼓聲是金鼓中所出妙音至皆悉能令成就具足先少得後多得云云若有衆生墮大地獄至所出之音悉能滅除釋此六義皆從三塗漸至人天二乘菩薩等一一皆有破惡生善之力一切諸苦無依無歸無有救護我為是等作歸依處夫法身具三德即是一體三寶法性是法寶寂而常照是佛寶遍一切處是僧寶自凡夫二乘雖不知亦不出法性總之一切菩薩何嘗不以此為歸依若得有所依則本立道生三智三行三身三脫一切道法任運而顯我為等者衆生性德全是果佛真如我也是諸世尊今當證知至現在世雄兩足之尊內本雖立外無佛加不得成就若蒙擁護斷惡生善辦在斯須如萌芽得雨扶疏豐是故請佛也我本所作惡不善業今者懺悔總懺者總懺三障也本者煩惱是二障本也惡者報障也不善者業障也三障障三身三佛三寶三障若轉諸三法門悉明故總懺也諸十力前不識諸佛及父母恩不解善法造作衆惡十力者一是處非處力三業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力此十通名力者即諸佛所得如實智用通達一切了了分明無能壞無能勝故名力也大菩薩亦分得此力但比佛小劣故沒不受名乃直名佛為十力也此之十力法佛本具報佛證之應佛用之衆生色心依正因果舉體即是三佛十力但獨頭無明癡倒殊甚不能觸處了達法身公於佛前造作衆罪如牛羊不識天子如鳥不識檠像於前造過愚癡不識法身亦復如是父母恩者方便是父智度是母此二法門能生法身而不了獨頭相應全是二智是不知報佛也不解善法者善法是助道之行能資智顯理而不解者是不識應佛三佛既皆不知豈非無明過患此別懺煩惱障也自恃種姓及諸財寶盛年放逸作諸惡行略言三種一以姓傲他二以財忽物三以壯年陵彼雖報有此三不應自恣堪以助道若縱恣者為修道障此約事釋報障也約法門解出家人以慧為姓繇慧得道故如姓貴定為財定能資慧故如財寶戒為年戒能制犯故如盛年染此三法自尊卑他皆名於報起障障故須懺心念不善口作惡業隨心所作不見其過亦是教他作惡也從身口意是自作惡也凡夫愚行無知暗覆親近惡友煩惱亂心五欲因緣心生忿恚不知厭足故作衆惡忿怒也求五欲則忿他不與有五欲則忿他見侵親近非聖因生慳嫉貧窮因緣姦諂作惡外道自以為聖故佛弟子指為非聖吝財曰慳妬賢曰嫉私詐曰姦曲媚曰諂繇貧窮故而作詐媚繫屬於他常有怖畏不得自在而造諸惡貪欲恚癡擾動其心渴愛所逼造作衆惡依因衣食及以女色至如是衆罪今悉懺悔或不恭敬佛法聖衆如是衆罪今悉懺悔或不恭敬緣覺菩薩如是衆罪今悉懺悔言無佛世敬田者以辟支佛出無佛世故菩薩歷劫形服不拘故無佛世隨機化物以無智故誹謗正法不知恭敬父母尊長如是衆罪今悉懺悔愚惑所覆驕慢放逸至如是衆罪今悉懺悔慢對他心舉驕繇染自法造業因緣甚多不可具列故總而懺之若欲細釋從人道為始二乘通別菩薩等行一一作之例應可解通惑所造名有漏業別惑所造名無漏業大悲不思議等種種之業故等覺來皆須懺也五十校計經云上至等覺皆須懺悔即其義也我今供養無量無邊三千大千世界諸佛我今等者此乃即法以明財供良繇了達所奉之供體是法界出生無盡一一周遍故一切剎一切佛前皆有六塵妙供養事不獨廣遍亦乃常存盡未來時施作佛事不然何能以有限之財遍供無量無邊大千諸佛我當拔濟十方一切無量衆生所有諸苦我當安止不可思議阿僧祇衆令住十地已得安止住十地者悉令具足如來正覺為一衆生億劫修行使無量衆令度苦海夫衆生等性欲亦等善巧度一衆多亦然不計劬勞積功纍德功成大覺即智德滿盡一切苦即斷德滿我當為是諸衆生等至所謂金光滅除諸惡千劫所作極重惡業至如是衆罪悉皆滅盡千劫者假多以顯懺力大耳涉時既多造罪復重若了逆罪即金光明全所具理為能觀觀繇此顯出法性金等轉障成德何罪不滅此乃名為正為說懺我今已說懺悔之法至速能滅除一切業障我當安止住於十地十種珍寶以為腳足珍寶者十地因可貴腳足者十地是果家之基本故言腳足又十度是十地之腳足於餘功德非為不修隨力隨分正以檀為初地之足檀足若滿得入初地乃至智度足滿得入十地故十度為十地腳足也成佛無上功德光明至十力世尊我當成就初句總明果滿餘是別明果滿功德光明者果上二種莊嚴也令衆生度海者果上轉法輪也法藏須論八萬四千皆祕密故名為甚深功德乃是六度萬行所成就者略言萬德廣則無量一切種智即中道智中必雙照令三圓極禪謂達禪達根本等皆法界故定謂楞嚴本性健相二是大乘事理二定於一切法皆明靜故泛舉百千根謂五根力謂五力此五能生善法名之為根能排五障名之為力覺謂七覺分有能到極果覺知之分道謂八正道能離偏邪通至涅槃此等修雖在因證皆果德陀羅尼翻遮持遮一切惡持一切善此乃自行始終之相諸佛世尊有大慈悲當證微誠哀受我悔若我百劫所作衆惡至在在處處暫無歡樂百劫者受報之時也所作衆惡即想行陰苦貧窮困乏即色陰苦愁熱驚懼心常怯劣即識陰苦暫無歡樂即受陰苦五陰即報報有所作作即是障十方現在大悲世尊至令我恐懼悉得消除我之所有煩惱業垢業垢者業名動作煩惱心動成於垢染亦可煩惱從夙業生故名業垢唯願現在諸佛世尊以大悲水洗除令淨同體之悲方稱為大此悲為水洗無不淨過去諸惡今悉懺悔至已作之業不敢覆藏問過現須懺未來未有云何言懺答今舉現事例之如在家人畫度生方起無量惡念事雖未有次第必更忽然發心捨家修道前所念事併與緣差未來之業亦應如此雖非現有時到必然今若懺悔索然清淨身業三種口業有四至十種惡業一切懺悔橫開現世三業為十惡可解遠離十惡修行十善至今於佛前誠心懺悔遠離者惡斷也修行者善生也不得止就三塗人天而解應須因位至於極果節節論於十惡十善十住者初心因位也逮十力者究竟果滿也若此國土及餘世界至願於來世證無上道衆生頑故愛著於有不能升出今懺此罪故云回向此土他方凡所作善皆施衆生共向佛果如聲入角則能遠聞方便力大與虗空等若在諸有六趣險難至三有險難及三毒難初四句是報障難諸有者二十五有報得之身造作衆惡豈非報障生死險難有二解若取其因即是業障若取其果即是報障種種淫欲即煩惱障心輕躁者復是報障輕躁是覺觀覺觀是尋伺陰心故屬報法近惡友者惡友能污染人三業此屬業障如移廄屠邊孟鄰哭貨朱赤墨黑即其義也三毒是煩惱障遇無難難值好時難至如是諸難今悉懺悔此有二義一若不修善障難不興若欲修善障難即起善非是障惡來遮善名善為難二者諸善是難善能障道豈非難耶今就後義解遇無難難者自謂無惡不肯修善如二乘入空生滅度想生安隱想不復進求菩提即其義也值好時難者如劫初時在單越時一向受樂都不修道豈非值好時難修功德難者多作有為求可意果如一比丘專行福德不修禁戒墮白象中七寶絡身金盂盛糞又妙莊嚴王本事等豈非修功德難值佛亦難者如旃遮婆羅門女善星調達等皆是值佛而難例此應云聞法起謗值僧起破皆是難也諸佛世尊我所依止是故我今敬禮佛海標諸佛者橫則十方竪則三世事即報應理即法身言略而意廣標章之巧妙也我所依止者依止法性一體三佛也佛海者四眼入佛眼十智入如實智皆失本名字但名佛眼佛智如物投石蜜如流會海無不甘鹹者法性三佛攝一切法故名佛海也金色晃耀猶如須彌是故我今頂禮最勝略歎者諸相好中略歎金色釋論以即時鐵比即時金即時金比海金海金比龍金龍金比閻浮洲金閻浮洲金比四天王金如是傳傳比第六天金第六天金比佛身金色第六天金如鐵然金色身是衆相所依處唯見金色故知是總歎衆相好也猶如須彌者須彌為四寶所成況佛身具四德故知總況也其色無上如天真金至佛日大悲滅一切暗此廣歎佛色無上無上者我德也善淨無垢離諸塵翳至莊嚴其身視之無厭此廣歎佛色無垢無垢者淨德也功德巍巍明網顯耀至如是種種莊嚴佛日此廣歎佛色安住安住者常德也頗黎此云水玉三有之中生死大海至是故我今稽首敬禮此廣歎佛色能除苦毒即樂德也潦行水如大海水其量難知至虗空邊際亦不可得此四句喻即況四德海無增減故常地體無垢是淨山形高出如我虗空無礙故樂以佛功德海思所不能知言所不能盡故一一難知諸佛亦爾功德無量一切有心無能知者至不能得知佛功德邊一切有心不能得知即是絶思思既已絶口何所宣即絶言也大地諸山尚可知量至諸佛功德無能知者問寄言絶言皆離思說同耶異耶答四德祕密本離心緣今之稱歎為令衆生入祕藏故故寄言絶言皆彰離念寄言用四喻於四德喻既莫數顯德忘緣絶言中四不可為喻亦顯四德忘於緣慮故知二文皆絶思說相好莊嚴名稱讚歎如是功德令衆皆得相者結一切相好者結一切好莊嚴者一一相一一好中皆具衆德以為莊嚴也我以善業諸因緣故來世不久成於佛道大覺圓明故屬意業講宣妙法利益衆生度脫一切無量諸苦摧伏諸魔及其眷屬轉於無上清淨法輪陰死天子多約於身煩惱屬意今從多分住壽無量不思議劫充足衆生甘露法味非無緣慈住壽不爾我當具足六波羅蜜猶如過佛之所成就六度成就此約真因破於六蔽從斷正論是智德故故名有為斷諸煩惱除一切苦悉滅貪欲及恚癡等此約真位垂形九道調伏衆生任運不與惑苦相應是斷德故故名無為我當憶念宿命之事至聞說微妙無上之法我因善業常值諸佛遠離諸惡修諸善業一切世界所有衆生無量苦惱我當悉滅若有衆生諸根毀壞不具足者悉令具足十方世界所有病苦至還得勢力平復如本若犯王法臨當刑戮至願使一切悉得解脫若有衆生饑渴所惱至衆生受者歡喜快樂上文大悲拔苦根不具者令具今大慈與樂視聽聰明暢悅快樂諸根語同與拔小異然須論十番所謂果報修因聲聞支佛四教菩薩方便實報今樹王拔此十種人苦珠王合與十種人樂願諸衆生常得供養至及諸菩薩聲聞大衆願諸衆生常得遠離至覲覩諸佛無上之王人緣不同或值佛難不除或難除不值佛今願其亦除亦值願諸衆生常生尊貴多饒財寶安隱豐樂至演說正法衆所樂聞人因不同或多財而卑賤或尊貴而貧窮因不具足今令其亦貴亦富女有五礙願其五礙苦若我現在及過去世至願悉滅盡令無有餘若諸衆生三有繫縛至除諸苦惱早成菩提若此閻浮及餘他方至我今深心隨其歡喜我今以此隨喜功德至得淨無垢吉祥果報若有敬禮讚歎十力至便得超越六十劫罪諸善男子及善女人至輔相大臣之所恭敬非於一佛五佛十佛至然後乃得聞是懺悔金光明經讚歎品第四述德為讚褒揚為歎釋論云美其功德名為讚讚之不足又稱揚之名為歎也凡有四意一從能讚人得名前品明信相思疑佛壽四尊盡降其室一心信解夜夢金鼓出聲且向耆山說夢今品佛述其昔為龍尊面讚法王願我當來夜夢晝說說斯人本事令衆歡喜故言讚歎品此世界釋二從生善得名夫善不孤運生必託緣緣中勝者無過於佛龍尊讚佛能生妙善從生善得名故言讚歎品此為人釋三從滅惡得名罪之尤者無過毀佛若翻滅斯罪應須讚歎讚歎治於毀訾從能治得名故言讚歎品此對治釋四從所讚人得名即是去來現在三世諸佛諸佛極尊甚深無量稱揚顯說故名讚歎品此第一義釋雖則從四悉檀立名正是生善之用爾時佛告地神堅牢至讚歎去來現在諸佛對告地神者主此大地菩薩行行皆寄其上壽命長久見去來今事證義事強如瑞應云積功纍德誰為證佛時指地是知我今說往昔金龍尊事所以對告地神也又對善女天者男天陽表權女天陰表實實智能生衆善善生宜對善女證往故宜對堅牢云云今論生善之用故對告善女金龍尊者此王往昔修金光明法門依法性理故言金能以智慧讚三世佛辨如雲雨故言龍能為衆生作大利益為物所仰故言尊從行得名故言金龍尊也我今尊重敬禮讚歎至諸佛清淨微妙寂滅總讚者竪總三世橫總十方三世十方心意識境是總事寂滅是涅槃義既稱微妙是大滅度則彰三德非縱非橫名祕密藏是總理總理是總法身總事是總報應二身總讚三身亦是總讚三德三寶等種種三法門如是諸佛總皆清淨清淨者即是總讚之辭也非但清淨亦常樂我云云此剋果明德也色中上色金光照耀至右旋潤澤如淨琉璃夫相好本莊嚴佛身佛身多種父母生身尊特身法性身身既不同相好亦異如林微尼園舉手攀樹化右脅生天地大動阿夷甚驚披㲲而相相相炳明決定成佛悲不能聲此是生身佛相也如釋論說巍巍堂堂譬如須彌映臨大海所有大相小相亦巍巍堂堂不同常身常光常相此即尊特佛身相也法性身佛者非是凡夫二乘下地之所能見唯應度者亦令得見此即無身之身無相之相一切智為頭第一義髻八萬四千法門髮大悲眼中道白毫無漏鼻十八空舌四十不共齒四弘誓肩三三昧腰如來藏腹權實智手定慧足如是等相莊嚴法性身也然相體不同相用亦異如足下安平相一切魔邪無能傾動者一切有無無能動者一切邊無能動者如頂肉髻相法不禮人亦不禮聖亦不禮分中初後既爾中三十相論用可知相用不同相業亦異如釋論修百福德成於一相三千二百福德成三十二相此即生身種相義也若以空慧導諸相業一一業悉與空相應諸相應中空相應最為第一此是尊特佛種相義也若以實相慧導成諸業一一業無非實相法界此是法性身佛種相義如此三身三相若業若用不得縱橫竝別若一異者則不清淨非微妙寂滅以不縱橫竝別故是絶言言歎所不及也今經正歎尊特身相上兼法性下攝生身處中而明實繇龍尊智巧如法相解如法相讚故大相小相相間而讚爾三十二為大八十種好為小一一相好皆是法界全體顯現據其總讚諸佛清淨微妙寂滅以總顯別一一相好皆祕密藏今初句是讚第十四金光微妙故云上色次一句讚第十五身光三一行讚二十八梵音深遠四一行讚小相中第七十九髮色青珠五一行讚二十二四十齒具足六一行讚二十九眼七一行讚二十七舌大薄覆面至髮際八一行讚三十一眉間白毫相此八中一是小相七是大相眉細修揚形如月初至微妙柔軟當於面門初一行讚第三眉如月初次一行讚第二鼻高好孔不現修揚者修長也揚舉也即是眉高而長也面門口也如來勝相次第最上既云次第最上即遍讚三十二也得味真正無與等者至聚集功德莊嚴佛身初二句讚二十六咽中津液得味中上味二一一下讚十三毛向上青色柔軟右旋三修臂下四句讚第九立手摩膝相四圓光一尋下四句讚第十五身光面各一丈此言一尋是約佛說也手既摩膝即當面各一丈也此既常光驗知諸相皆是常相云讚尊特者以不須身大相多但是業識依中理見即名尊特除此四大相外或歎放光苦與樂行業之因功德之果悉如文可知臂𦟛纖圓如象王鼻即第十四指長纖圓也𦟛丑凶反均也直也又音容手足柔軟敬愛無厭即第四手足柔軟勝餘身分三十二相八十種好具如法界次第龍尊智巧雖略而周去來諸佛數如微塵至百千功德讚詠歌歎諸佛法身平等一心一慧應化亦然特舉一佛一相以為讚端遍類諸佛亦復如是文殊問般若云念一佛功德與十方諸佛等即其義也身口清淨有二解一云所讚者三業清淨我今悉禮二云能讚者清淨以好華香是身淨奉獻是意淨歌詠是口淨云云設以百舌於千劫中至況欲歎美諸佛功德大地及天以為大海至無有能知佛一功德而有三番者或應擬三身絶言也一人百頭頭有百口口有百舌住壽千劫讚生身佛相好功德不能得盡一人千頭頭有千口口有千舌住壽萬劫讚尊特身佛相好功德不能得盡大地及天毛滴其水一切有心不能知法性身相好功德是故絶言絶心歎我今以禮讚歎諸佛至與諸衆生證無上道一回事向理即實際二回自向他即衆生際三回因向果即菩提際今闕實際菩提兼之謂無上道本性無上故也如是人王讚歎佛已至夜則夢見晝如實說我當具足修行六度至令我世界無與等者不修六度不衆生土無繇淨當知四修及四相令於當世見我三身奉貢金鼓讚佛因緣至常生我家同共受記以鼓必具圓空鳴義今讚如來一體三身名為金鼓讚佛因緣以此因緣趣向果地名為奉貢不論事相金鼓形也若有衆生無救護者至施與衆生諸善安樂我未來世行菩提道至功德淨土如佛世尊此之二願皆明滅惡生善二益在文可見信相當知爾時國王至今汝二子銀相等是結會古今如文金光明經空品第五夫空者破相為義應有四種謂滅色入空即色是空滅邊入空即邊是空此經通三乘懺悔應須四種空而今品但標空者專是即邊而空也何故爾經云無量餘經已廣說空是故此中略而解說知唯圓空耳又空者空有空無空有者空二十五之塊有空二乘之灰無兩邊清淨名之為空直作此說惑者迷名濫理不能超悟今作六句分別空破非有非無非有非無破空空修非有非無非有非無修空空即非有非無非有非無即空空破非有非無者所謂凡邪非有非無見二乘偏住非有非無證別教教道執非有非無門悉為空品空所破也凡邪之見多種一單四見謂有無亦有亦無非有非無二復四見謂有有有無無有無無亦有亦無有亦有亦無無非有非無有非有非無無三具足四見謂於一句中具有四句四四十六句故名具足也雖單復具足皆苦集浩然雖計為非有非無實是妄見故為空品空所破也二乘偏住非有非無證者斷常見故言非有斷斷見故言非無有無二見滅無餘三界見思永已盡生滅度想生安隱想梵行已立所作已辦不受後有保此而已不復進求三菩提但二乘發真斷常見斷斷見其門不同或從有門入如阿毗曇或從無門入如成實論或從亦有亦無門入如昆勒或從非有非無門入如那陀迦旃延經離斷離常名聖中道四門俱斷斷常名同中道實是保偏取證故為空品空所破也別教教道執非有非無門者佛為鈍根菩薩方便權巧作四門說中道如彼筏喻不得意者四門成諍故涅槃云真善妙有大般涅槃空佛性亦色非色非色非非色若各執一門則於如來有諍訟心不見中道執此教門猶為空品空所破也非有非無破空者還是凡邪之空見二乘之空證教道之空門墮在二邊故為中道非有非無所破也相修者見空證空教道空應修中道非有非無也非有非無見非有非無證非有非無教門應修中道空也相即者破二邊空即是中道非有非無中道非有非無即是破二邊空無二無別般若是一法佛說種種名空即非有非無而不以非有非無為名者為略說故故言空品也得此三雙六句庶不至迷名失義耳若原來意懺品破惡讚品生善倘其不了此空懺非無生破惡不盡讚非稱性生善不深善不深故豈成智德惡不盡故豈成斷德鈍根之者於前未悟故於今品圓談空慧導前懺歎令成二用亦是導成用宗體等前常果顯體滅惡生善非不明空利者已解為鈍根故起大悲心更明五陰生法本性空寂導成上義故有此品之來耳無量餘經已廣說空至如我所解知衆生意無量餘經者指廣而明略亦是標略以顯廣若指般若則此經非方等攝若不指般若諸經不廣明空義此復云何答經有前後分前分有次後分不定結集者以後分明義氣類若同向前集之所謂攝後歸前不乖次第也此經屬方等後分指般若為廣說於義無妨略而解說者佛有略廣二門或名義俱廣如十八空等或名義俱略如一獨空或名廣義略如法性實相等衆多名共名一義或名略義廣如生法二空之名而義太廣迄從凡夫至於極佛皆名衆生論云衆生無上者佛是從凡夫五陰極至佛地亦稱色解脫受想行識解脫論云法無上者涅槃是今言略說生法二空下文云五陰舍宅觀悉空寂善女當觀何處有人及以衆生即其義也衆生根鈍者根緣不同約聞持則廣說得悟名利略說得悟名鈍約義持則一聞得悟是略是利再聞得悟是廣是鈍今正就聞持邊不能於廣聞得悟故言根鈍不能廣知也無量空義者二乘真諦不具色心是有量空義菩薩中道具足妙色妙心出生不竭融攝無遺是無量空義此經名法性實相即是無量空義也異妙方便者即是悉檀方便巧作上來辨果明因滅惡生善種種分別等是也起大悲心一類衆生著有病重故大悲亦重我今演說者演名為廣與略相違上論生法二空是名略今論生法二義故言演耳知衆生意者知此一機樂略宜略對略悟略故言知意也敘欲說空意竟是為虗僞猶如空聚攬陰成身計有我人衆生壽命身見得生若體其生名虗僞則求身叵得身見不起餘知見亦寂故約假身為生空之境又檢此身原繇一念妄想託父母遺體假名之始也此赤白二渧色陰也覺苦樂受陰也想此苦樂想陰也具三性行陰也識於中住識陰也又精血是地大溼是水大暖是火大氣命是風大四大圍空是空種心依此住是識種此實法之始也觀此身與名依妄僞法豈可為真故言虗僞空聚者身名積聚如水上泡圍空而起泡名亦起起即有滅泡名亦滅無明業力託父母體即陰泡起陰泡起即身名起陰泡滅即身名滅故言空聚也六入村落結賊所止一切自住各不相知六入六根也能生於識名之為根塵之所趣名之為入亦為識之所入故名六入也識依根住故名為村塵從此入起諸結縛能害慧命故言結賊所止眼見耳聞鼻嗅舌嘗身觸意緣各有所伺不得相濫故言各不相知眼根受色耳分別聲至諸塵境界不行他緣十二入者開色為五根五塵并法入少分開心為意入及法入少分少分者法入攝二種法一者心法除心王但取相應諸心數也二者非心法即過去未來色法及心不相應諸行及三無為法也塵入於根根入於塵互相涉入通名為入根生識強別名為根塵污義強別名為塵當一根塵互相涉入故言各各自緣他根不入此塵此塵不入他根故言不行他緣也心如幻化馳騁六情六賊所害愚不知避假令眼耳不對於塵心亦追緣過去預念未來故言馳騁猶奔走也正一室坐馳天下以愚癡故不知根塵空險故為賊害如大經云譬如有王以四毒蛇盛之一篋令人瞻養若令一蛇生瞋恚我當準法戮之都市其人怖畏捨篋逃走王時復遣五旃陀羅拔刀隨後一人藏刀詐為親害其人不信投一聚落欲自隱匿既入聚中不見人物即便坐地聞空中聲云今夜當有六大賊來其人恐怖復捨而去路值一河其水漂急即取草木為筏截流而去既達彼岸安隱無患菩薩亦爾聞涅槃經觀身如篋四大如蛇五旃陀羅即是五陰詐親即貪愛空聚即六入六賊即外六塵河即煩惱筏即道品到於常樂涅槃彼岸心常依止六根境界至隨行色聲香味觸法識常在根故言六根識常在塵故言境界若謂識不在根塵那忽即對即覺以即覺故故常在根塵心處六情如鳥投網至隨逐諸塵無有暫捨識之於根乍出乍入如鳥在網出入間關一捨一周而復始無暫休息識在根網亦復如是或在於耳或在於眼去還無定雖復無定而得論常在云云身空虗僞不可長養長養即十六中長養見也妄計我能養育於他又是計我為父母養育此見既空餘見亦空即是結上生空境也無有諍訟亦無正主若計有四大則有相違如四蛇相陵四國相拒可有諍訟今觀四大空不能得空便故言無有諍訟亦無正主者遺教云此五根者心為其主此明託胎之始心在諸根之初名之為主其實不能控制諸根根大相違心為受惱身病時心亦隨病寧得是主耶或時更互論主如地具四微則鈍為水所制水但三微為火所制火但二微為風所制風有一微為心所制心無有微故得為主復為四大所惱主義不成故言無正主從諸因緣和合而有無有堅實從諸因緣者苦是世間果集是世間因此之因果皆因緣生今之所辨雖涉苦果其意乃明集之因緣繇不了生法二空無明內惑為因從此觸處染著染愛於外為緣無明潤愛集業得起故言從諸因緣和合而有以業起故則有一念託胎招於苦果此一念託胎繇無明愛能生既妄所生亦妄討其本末能所都虗既皆不覺豈是真實故云無有堅實也妄想故起業力機關假僞空聚地水火風合集成立繇妄想不了一念託胎五陰得起業力機關正法喻竝顯世間機關本偶必假人動轉方能動作去來而此陰果形質須繇業因感集始能於中領取造作是知善惡業是機關主色陰是機關具受想行陰正動作去來識陰是看人以自娛樂耳假僞空聚者亦是識陰依六入而住故言空聚四大所造故言成立也隨時增減共相殘害至火風二蛇性輕土升竪論增減者如涅槃十時別異從歌羅邏時名增壯時名盛老時名減橫論增減者火增水減水增火減風地亦爾又念念生滅生是增滅是減又新諸根生故增故諸根滅故減又下文云隨其時節共相殘害春風夏火秋地冬水增減云云譬如四蛇初在篋時名生四蛇力敵名壯互相強弱名病蛇鬬困暫息不動謂為調適息已復鬬蛇羸如老蛇絶為死如是增減此是果身如此繇乎集業四分等如地瞋如火欲如水癡如風此四分互相違瑞應云貪欲致老瞋恚致病愚癡致死例云等分致生集業相噬致四大增損云云同處一篋者此明篋同性異經舉四蛇以喻四大意彰四分有毒害義一分具足二萬一千四分有八萬四千煩惱無量劫來法身慧命喪壞繇此與蛇有螫毒為害義同大經以假身為篋身持四大如篋貯蛇篋壞則蛇去身滅則大亡又用業力為篋業持四大業謝則大散如鳥在籠處處求出心鳥亦然外馳六塵未嘗一念繫在身篋其性各異者二上升是陽二下沉是陰何故相違猶其性別性別那能和合成身諸方亦二者四大對四方風東火南地西水北又對四時風春火夏地秋水冬東與南屬陽而上升西與北屬陰而下沈故言二上二下諸方亦二若相對論者東上西沉南升北降若論四維者東方帶兩維一維陽上一維陰下餘三方亦如是或言一根中具四大二上二下云云悉滅無餘者謂言風火向上地水向下比至上推不得於風火下檢不見於地水故言悉滅無餘也苦果升沉碩異繇於集業善惡天乖云云心識二性躁動不停至隨所作業而墮諸有釋論云心意識一法異名對數名為心能生名為意分別名為識又言有異前起為心次起為意後了別為識故云心識二性者心意識三俱有善惡性異此指隨緣染習之性非真理不變之性也躁動者二義一如心前起時亦與數俱意識後起亦與數俱故言躁動一如四大壞時善惡業爭牽不知從誰有此世雖行善先世惡業熟既與時合即受惡報此名熟牽有人雖行惡臨終之時善心猛盛即隨善上升此名強牽如此熟牽強牽彌顯躁動下例釋可知水火風種散滅壞時至捐棄冢間如朽敗木此明業謝棄苦器也氣命盡是風去故言散暖盡是火去故言滅水盡則身爛故言大小不淨盈流於外地散滅是骨肉離解故言如朽敗木大小不淨者身為大四支為小足支為大手支為小手為大指為小如是轉轉作大小皆悉臭穢不淨盈流此名助道若正觀降伏煩惱煩惱不伏當修不淨助破欲心此不淨觀亦具生法二空大經云諦觀白骨一一支節何者是我八色流光亦復無我我不可得即是生空鍊骨人八色不見四大無有於實即是法空此就助道明於生法終成正道爾善女當觀善女者菩提樹神也諸佛說法必有對揚寄一以酬衆故告其人也又時衆機緣宜在善女若聞對告宿善發生又男天表方便女天表智度欲說智度破於愚著故告女天也又佛在道樹得道欲說此道故對告樹神也此是表四悉檀對告非無因緣也當觀者勸一以例諸一切菩薩必須修於智度無不繇此者故言當觀也諸法如是諸法者指上四諦十二因緣若假若實二空之境名目雖略攝法則遍故言諸法也如是者正明總觀也約義有三謂如事如理如非事非理如事者如助道假想不淨流溢也如理者如生法二空無法也如非事非理者如法性法身也以三法不一異故言如是三法亦一異故言諸法何處有人及以衆生本性空寂無明故有何處有人者點出理觀也何處者若色處有人則不須四陰若色處無人四處亦無人五處都無人故言何處有人又果處既人無無明行因處亦無人因果合亦無人離因離果亦無人故言何處有人也人既無衆生十六知見等皆無故言及以衆生也本性空寂者點出非事非理觀也本性無事亦復無空空本空事既已無事空何所空無事故事寂無空故空寂本性如此非今始然故言本性空寂也無明故有者點出事觀也若其空而復空那得此事既有事即有空既有空即有非事非理此之三種悉繇無明故有若知無明本性空寂尚無無明那得事理非事非理畢竟清淨故稱空慧也但我見深重為覺道大障若攬他遺體而計我者此我疏鈍若執法塵而計我者此我密利略則十使廣則二十種身見謂即陰計五離陰計五我中有五陰陰中有五我是為二十若破此見而其內心猶計有我復當反觀即智是我離智有我我中有智智中有我亦須破二十身見然破時通上三句皆通用之若即事而理何處有人即陰離陰陰中無人人中無陰二十種見破故言何處有人能觀之智智即是人離智有人人中有智智中有人此計亦破故言何處有人若作非事非理本性空寂觀者本性空寂本無即陰離陰陰人人陰既無如此計破故言何處有人能觀之智本性亦寂故言何處有人若作助道不淨觀時若觀惡心取境即是污穢五陰若善心慚愧即是方便隱沒五陰是見皆依色色即不淨以不淨故無人無我故言何處有人能觀觀智亦復如是故言何處有人如是諸大一一不實如是諸大者標四大法也一一不實者正明空觀也若四大各守其性者地守堅性不應動不應暖水守濕性不應冰不應波火守熱性不應貞不應𦦨風守動性不應持不應觸壁而止一大既有三性非都堅非都濕非都熱非都動失本性故則是不實不實故空請觀音云地無堅性水性不住火從緣生風性無礙一一皆入如實之際即其義也本自不生性無和合以是因緣我說諸大從本不實本自不生者即法本性不生不滅非空非假觀也體其元不生中無和合末亦不空元無四大四大何得而生元既不生中那和合四大既不和合寧得五陰和合大陰既不和合那得法空本自不生不滅非是觀智令其不生不滅即事而理此之謂也以是因緣者觀與理冥達即空即假即中和合而有和合而有即法而假也既本體不實那得大陰此繇無明業因託今遺體之果故有四大五陰即是迷惑因果而有此法有故體有非有亦非有非非有即空即假非空非假三觀明文在經寧不信耶無明體相本自不有妄想因緣和合而有無所有故假名無明是故我說名曰無明此即與釋論誰老死義同故知是生空境行識名色六入觸受愛取有生老死愁惱此即與釋論是老死義同故知是法空境例應有三謂行即空假中乃至老死即空假中特是文略得意可知然十二因緣經論不同或三世或果報或一念今經不論此等但以假名無明為生空境行識色心等為法空境如捉火燼暗中舞之圓輪相續團團不斷火者實法也輪者假名也衆生長夜著於假名舞燼不息迷於陰入薪火不息十二因緣何繇可盡若知輪依於火止手則無輪火賴於薪除薪則無火輪火雙無生法二空也衆苦行業不可思議生死無際輪轉不息衆苦行業指上生法當體妙故不可思議若生若法皆非空有如是體達名為中觀此觀不見生死輪轉有際有息即法界故無際皆常住故不息本無有生亦無和合上句是生空下句是法空也不善思惟心行所造前不善思惟致今名色今不善思惟復有未來老死云云斯乃舉病必對於藥假觀彰矣更為鈍根說空觀相若假名自生不須實法若繇法生非假名生若假實合生應有二假若離假實則無是處今之假名但有名字名不在內外兩中間亦不常自有以不可得故是名觀假名空觀實法空者若名色自生不應待業若業能生羅漢有業何故不生若業果共生各有名共各無寧共若無因緣生則無是處既不得生亦不得不生亦不得亦生亦不生亦不得非生非不生亦不得滅亦不得不滅亦不得亦滅亦不滅亦不得非滅非不滅無滅無生名為無生無生故假名壞假壞故則六十二見壞見壞故實亦壞既不然火是則無煙日中舞燼是亦無輪是略示空觀相假觀中觀具如止觀破法行者應知我斷一切諸見纏等至證無上道微妙功德一切諸見者六十二見八十八使等故言一切此是生空觀成也以智慧刀者譬智慧利用上譬斷見下譬斷煩惱纏者別名十纏即瞋覆睡眠戲掉無慚無愧慳嫉煩惱網者通明十使網有羅之失舍有覆暗之過達陰空寂暗障不能蓋裂網破壞網罥不能礙此是法空觀成也二乘所斷是通見纏菩薩所斷是別見纏而言佛斷見纏者若通若別究竟盡在於佛也證無上道者生法二空正道滿也微妙功德者生法二空助道滿也開甘露門示甘露器至令諸衆生食甘露味甘露是諸天不死之神藥食者命長身安力大體光譬諸佛斷德住大涅槃真常樂我淨用知是斷德滿也然此義意復欲通對華嚴諸位開對十住示對十行入對十向處對十地食味對妙覺佛地果圓斷德已滿慈悲力大能為衆生開於十住示十行入十向處十地食甘露味功用具足斷德化他二義俱成也又對般若四智開對道慧示對道種慧入對一切智處對一切種智食味對佛住大涅槃以大悲令衆生得此四智於果地斷德義亦無妨又對法華開示悟入佛之知見良繇佛德圓滿能以大事因緣出現於世開示衆生佛知見也於斷德義亦顯又涅槃云常樂我淨於果斷最便如前釋云云吹大法螺擊大法鼓然大法炬雨勝法雨舉四譬者聞法之益實自無量略舉四譬別有所擬吹螺是改號譬佛說小乘法改凡夫苦忍之凡性入聖人之正性說大乘法改凡聖之偏性入中道之圓性通七地別初地圓初住皆是改號之位從偏以入中也擊大法鼓者擊鼓誡進肅衆前驅此譬佛說法督進深行小乘位在修道通在八地別在十行圓在初住此諸位以聞法力咸進真修道也然大法炬者炬能自照亦能照他譬佛說法令自他雙益如千年暗室一燈能了又如一燈然百千燈聞法之力自他俱益亦復如是通八地別十向圓亦在初住皆是道觀雙流自他俱益之位也雨勝法雨者雨能成熟農夫加功扶疏益寡時澤一降華果敷榮喻如衆行雖復勤修發趣事弱聞佛說法增道損生任運成熟自然流入薩婆若海此竝在雙流位中義如上說皆言大者說大法也通途解釋明大非小位爾我今摧伏一切怨結竪立第一微妙法幢怨結者四住是二乘怨結五住是菩薩怨結魔為煩惱主伐樹去根化物須降主若不降魔化道不暢降魔之法須用神通譬如勝怨乃可為勇非法王不壞法王勝者是時化道得立爾竪法幢者法幢三昧也高出衆行為衆行之望如兵望麾也三德不縱不橫故言微妙度諸衆生於生死海永斷三惡無量苦惱此是初弘誓永斷三惡即三惡道也須約十番論度論斷煩惱熾然燒諸衆生無有救護無所依止此是第二弘誓須明五住燒十界生我以甘露清涼美味充足是輩令離焦熱此是第三弘誓當分而論四種甘露跨節而談唯一圓常於無量劫遵修諸行至金銀琉璃種種異物此是第四弘誓無量劫者積功高也遵修諸行者攝法廣也此中指檀為四諦檀對於慳慳貪自蔽是集集業招果是苦檀能破慳是道慳滅是滅不獨行檀具於四諦五度皆然五不依諦則不動不出何度之有復須知今依無作諦又論云若菩薩行檀度能生六度是時名檀度滿云何布施生檀度有下中上若以飲食粗物軟心布施名下能以衣服寶物布施名中若以頭目血肉國財妻子布施名上云何施生尸度菩薩思惟衆生不知布施後世貧窮故行惡若行布施後世有福無所乏短則能持戒云何生忍度菩薩施時受者惡罵若大求索若不時索或不應索而索是時菩薩思惟我今布施欲求佛道亦無有人使我布施我自為故云何生瞋如是思惟已而行忍辱云何生進度菩薩布施時常行精進欲行二施勤求財法以求足之云何生禪度菩薩施時能除慳貪而行一心漸除五蓋是名禪度又心依布施入於初禪乃至滅定云何生智度菩薩施時知有果報而不疑惑能破邪見無明又分別淨不淨施得報不同是名生智故云檀義攝六也餘之五度亦互相攝非今文意故且論檀六之首故攝生便故捨身命財與後際等俱不壞常住名波羅蜜竪高橫廣故言遵修諸行也仍須了知既談果後行檀利物行人豈不即聞而修耶金光明經卷第一
