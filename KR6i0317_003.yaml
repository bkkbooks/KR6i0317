body:
  text: 明鹽官安國寺比丘受汰集金光明經卷第三北涼三藏法師曇無讖譯金光明經散脂鬼神品第十具存梵音應言散脂修摩此翻為密密有四義謂名密行密智密理密此順四悉檀義皆約三法不縱不橫非偏小凡下所知是故為密蓋北方天王大將餘三方各有東方名樂欲南方名檀帝西方名善現各有五百眷屬管領二十八部孔經云一方有四部六方則二十四部四維各一部合為二十八部又說者云一方有五部地水火風空四方有二十部足四王所領八部是為二十八部巡遊世間賞善罰惡皆為散脂所管聞經歡喜發誓護于說者從能護人受名故名散脂又雖三天王各有神將散脂為首故獨標名耳爾時散脂鬼神大將至右膝著地白佛言世尊是金光明微妙經典至舍宅空處皆亦如是世尊何因緣故我名散脂至唯然世尊自當證知唯然上聲禮對曰唯野對曰阿世尊我知一切法至於一切法含受一切法智若淺深階級次第不名為密即一智一切智一切智一智非一非一切而一而一切者斯是妙空妙假妙中乃名智密若得此意五句一句一句五句非一非五而一而五唯數唯密爾世尊我現見不可思議智光至不可思議智境若境可以智知可以口說者境則非密不可智知不可識識不可以名名不可以言說斯是境非智外識即是境境離名字及彼言說乃名絕思絕議密境也而約五數論密例上可知世尊我於諸法正解正觀至正解於緣正能覺了若對邪明正待邊說中此正非正此中非中皆非是密即邪而正即邊而中邪正中邊趣舉其一收法畢盡無二無別者乃名為密我行正道若境若智從此得名唯然世尊自當證知又一往前五句言知知即意密次五句言現見見是眼即身密後五句明正解繇正解故言正分別分別即口密所以言不彰露者是密義也若約義別釋初番即三觀義知一切法一切緣法兩句是因緣所生法境何者能生為因是初句所生為緣是第二句能所合故諸法得起中論云因緣所生法即此義也了一切法者了達虗無也中論云我說即是空是為從假入空觀也知法分齊者知空非空用道種智分別假名凡聖之法而有差別中論云亦名為假名是為從空入假觀也如法安住一切法如性者以二觀為方便得入中道第一義諦中論云亦名中道義即是中道第一義諦觀也含受一切法者即是中道正觀能雙照二諦故言含受若三觀一異縱橫竝別者則不名密觀即一而三即三而一名為密耳次番即三諦三解脫義現見不可思議智光者光是實智如日月光常明不息此實智照不可思議真諦境成圓淨解脫不可思議智炬智行智聚者皆是權智如人執炬屈曲照物乍興乍廢隨順機緣或此或彼行因義聚果義從因以向果果興而因廢皆是權智照不可思議俗諦成方便淨解脫不可思議智境者是法如如智此智與法如如冥故言不可思議智境此智照不可思議中道第一義諦成性淨解脫若一異縱橫竝別者非不可思議以不可思議故名密也後番即三身義正解正觀正解能顯體體顯名正觀正觀是報身也得正分別正解於緣者分別機緣不待時不過時普應一切即應身也正能覺了者無覺無不覺名為覺非了非不了名為了究竟清淨之覺了即法身也若一異縱橫者不名為正以非一非異不前不後故名正耳正即密也統上雖作三觀三脫三身三節解之而十五句一一皆是金光明海一一互通可以意知若對題則約正明法身即是金義約觀明般若即是光義約不思議明解脫即是明義三德是微密之藏金光是微密之教從密教生密解安住密理行於密行以密利他故我名密唯然世尊自當證知若對五佛性初番我知一切法者正知一切法中悉有安樂性安樂性者即正因佛性一切緣法者無量功德舉手低頭等善即緣因佛性了一切法者般若空慧即了因佛性知法分齊者即世間出世間因果不濫境界因佛性如法安住如性者即是果性究竟安住如中也含受一切法者還是果性能雙照含受也後之二番準此以釋世尊以是義故名散脂大將世尊我散脂大將令說法者莊嚴言辭辯不斷絕眾味精氣從毛孔入充益身力心進勇銳成就不可思議至身受諸樂心得歡喜以是之故能為眾生廣說是經若有眾生於百千佛所至是妙經典令不斷絕無量眾生聞是經已至三惡趣分永滅無餘問既得智聚又攝福聚斯乃真似二種莊嚴合居方便及實報土經那但云無量千劫人天受樂答須知十益皆悉不離二十五有此中乃是人天方便人天實報故仁王般若云出三界外更有眾生界者此是外道大有經說須知四土若橫若竪祇在三界一處而論學者宜審南無寶華功德海至智慧功德成就大辯天南無此云歸命佛說一切眾經初皆歸敬而譯人略之諸論初亦先歸敬此文是說竟歸依三寶佛法可知功德大辯即菩薩理和僧也金光明經正論品第十一正論者正名為聖聖有二種一世聖謂輪王也易曰備物致用立功成器以為天下利莫大乎聖人管子曰聖人若天然無私覆也若地然無私載也此皆言世間聖人二出世聖謂三乘果人斷惑證理名聖也論名覈實亦有二種一覈事實則世間正論可以治國二覈理實則出世正論可以詣道此品是先王舊法先王傳力尊相力尊相傳信相信相又傳其子其子又傳後世世世正聖世世善實即是先王之法言亦是世界悉檀立名名正論品王行此法法律相應陰陽以之調日月以之順百穀以之豐萬民以之樂社稷以之安治化以之美即是民用和睦上下無怨亦是為人悉檀立名名正論品王用此法外敵不敢謀內姦不敢驚妖星不敢現惡虹不敢行暴風不敢動疾雨不敢零是則禍亂不作灾害不生亦是對治悉檀立名名正論品此之世善本金光明從金光明出此正論善用此正論天宮天身以之光明天力天威以之增長天心為之倍樂天之法味為之倍加深遠即是先王之至德要道亦是第一義悉檀立名名正論品也此文是流通中第二意明人王弘經感通冥聖天王佐助善政興隆爾時佛告地神堅牢至為信相太子說是偈言受灌頂位者華嚴三十九云轉輪聖王所生太子母是正后身相具足其轉輪王令此太子坐白象寶妙金之座張大網縵建大法幢然香散華奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位墮在灌頂剎利之數即能具足行十善道亦得名為轉輪聖王我今當說諸王正論為利眾生斷諸疑惑一切人王諸天天王應當歡喜合掌諦聽諸王和合集金剛山護世四鎮起問梵王至云何是人得名為天云何人王復名天子生在人中處王宮殿正法治世而名為天護世四王問是事已時梵尊師即說偈言汝今雖以此義問我至敷揚宣暢第一勝論因集業故生於人中王領國土故稱人王故稱人王者諡法曰德象天地稱帝仁義所生稱王白虎通曰王者往也天下所歸往也處在胎中諸天守護至能令眾生多生天上答天舉三義者未入胎入胎分德力加是也以護胎故稱為天子答第二問也以分德故有其天德故稱為天答第一問也神力所加修善遮惡後必生天因中說果故稱為天答第三第四正法治世名為天問也答半名為天三義竟半名人王亦名執樂至現受果報諸天所護答有三義故稱半為王一名執樂者樂繇於王王執此樂使天下和平五日一風十日一雨老者擊壤小騎竹馬誰不歸德故執樂者名王二者遮惡為民除害天不亢旱地不洪流草不折傷民無疾癘者誰不歸德故遮惡名王三父母者誨示禍福導語善惡制禮作樂而民知禁誰不歸德故父母名之為王能為民下作父母故諸天護之名為天子以遮惡不起諸天分德名之為天以執樂故因中說果復名為天非但半名人王義成半名為天三義亦顯若有惡事縱而不問至壞國土者不應縱捨三十三天各為瞋恨是天不護不護故非天子是諸天王各相謂言是天不分德不分德故不得名天捨遠善法增長惡法則無天因寧得因中說果歎人為天也生大愁苦者無執樂義疾疫流徧無遮惡義縱惡不顧善無父母義是以不得名天不得名王當正治罪是故諸天至善能攝護安樂眾生當正治罪即父母義諸天護持即天子義以滅惡法即魁膾義魁膾名典軍遮制惡鬼鬼畏典軍不敢亂行也修習善法即執樂義應各為說即示因果義諸天即分德義還以六義消文皆可尋問金光明是正論本其意云何天者法性金也法性作依止故言天護分德者即光也報身與法性冥即是分德也神力所加者即明也又父母者即金也法性為父母故遮惡即光也執樂即明也以此為本能正論爾如半名人王半名為天為世間正論半名出世間正論本末相關即此意也金光明經善集品第十二此轉輪王集眾善法如海導師善海無涯六度則攝六度又廣二度略攝謂檀與智提如意珠捨四大地滿中珍寶以用布施即集檀行也合掌而立請寶冥尊者宣揚顯說是金光明即集智行也檀智既然餘法亦爾從行得名故稱善集品也此六度不同是世界集善修於五度是為人集善修於智度是對治集善皆波羅密是第一義集善從此四集得名故言善集品爾時如來復為地神說往昔因緣而作偈言我昔曾為轉輪聖王至求正法故常捨身命又過去世不可議劫至明如日中悉能徧照治政之勢者謂化之勢分極於海際是轉輪王夢是事已至是金光明諸經之王時寶冥尊即受王請至敷揚宣說是妙經典廁雜也填塞也繒帛之總名也曼陀羅此云適意曼殊沙此云柔軟舊小大白小大赤不鼓鼓擊也是時大王為聞法故至以用布施供養三寶熈怡悅樂也璝美石次玉琦玉名珥璫釋名云穿耳施珠曰璫珥蒼頡云珠在耳也爾時為王說法比丘至今則我身釋迦文是我於爾時捨此大地至正法之身我今已得就此品指歸三法善集波羅密是金集般若是光集五度是明此就善集約智行及果對于三法在一窟中金也面如滿月光也讀誦是經明也此就寶冥約依正對於三法在窟中是金許為王說是光王提如意珠雨四天下珍寶是明此就二人約寶冥依正與王雨寶對於三法然依正自他人物如此分對者以祇一法性則物物皆金光明海心心是三德祕藏即而不離方得名為經王耳金光明經鬼神品第十三鬼字訓歸又云畏也報多怖畏又云威也能令他畏其威也神者能也大力者能移山填海小力者能隱顯變化若依俗釋鄭玄云聖人之精氣謂之神賢智之精氣謂之鬼禮記曰明則有禮樂幽則有鬼神此品是第三一切天龍鬼神天地靈祇咸皆發誓溥徧弘宣以勸流通佛告功德天若有善男子至三世諸佛甚深行處佛從慈悲中起受供養者蓋應佛也佛從如中起覺智智與如合者報佛也一切法悉是諸佛行處者法佛也作如此解者三佛歷別若修事之供養供養亦別謂四事供養資持應佛萬行功德資成報佛稱理之智顯發法佛資成顯發皆供養義是人應當必定至心至至心聽是微妙經典聽經是法之供養諸供養中最為第一第一供養者供養一切佛佛說文字是應佛能詮是報佛所詮是法佛能供養文字即供養三佛亦是供養三世佛諸佛從此生故爾時世尊欲重宣此義而說偈言若欲供養一切諸佛至功德福聚悉已得之若入是經者一言于經即有三種謂教行理能了此三是妙三法名入是經若不然者安得入經即入法性所入法性無量甚深三義具足名金光明稱此安住名之為如即見釋迦三身妙體須論觀行相似分真入經見佛隨所至處若百由旬至一切惡事消滅無餘百由旬滿中盛火從中過者為法亡軀也蠱道者四天上遣神名彌栗頭虔伽陀漢言善品主蠱毒也於說法處蓮華座上至而為諸佛之所讚歎威德相貌無量無邊至入陣得勝心常歡喜大梵天王三十三天至愛樂親近是經典者閻摩羅王或閻摩羅社此云雙王閻摩雙也羅社王也兄及妹皆作地獄主兄治男事妹治女事故曰雙王又苦樂竝受亦名為雙那羅延此云鉤鏁力士摩醯首羅餘經翻為大自在灌頂經翻為威靈帝摩尼䟦陀翻威伏行富那䟦陀翻集至成金毗羅翻威如王賓頭盧伽翻立不動車鉢羅婆翻忍得脫曇摩䟦羅翻學帝王摩竭婆羅翻除曲心繡利密多翻有功勳勒那翅奢翻調和平劍摩舍帝翻伏眾根奢羅密帝翻獨處快醯摩䟦陀翻舍主薩多琦梨翻大力天難陀翻喜䟦難陀翻賢喜兄弟二龍風雨應時能令人喜賢謂性又賢善故波利羅睺翻勇猛進毗摩質多翻高遠睒摩利子翻英雄德波訶梨子翻威武猛佉羅騫䭾翻吼如雷鳩羅檀提翻戰無敵於諸眾生增命色力至如上所說無量功德優鉢羅華下四句四色蓮華優鉢羅是青波頭摩是赤拘物頭是黃分陀利是白金光明經授記品第十四授者與也記者記成道事也亦名授莂亦名受決授劫國數量名為莂審實不虗名為決從佛所與名為授從其所得名為受此中授三大士一萬諸天當來成佛事從佛所與故言授記首楞嚴三昧經佛告堅意記有四種一者未發心記或有流轉六道生於人間好樂佛法過百千萬億劫當發心過百千萬億阿僧祇劫行菩薩道乃至供養佛化眾生皆經若干當得菩提二適發心與記是人久劫種諸善根好樂大法有慈悲心發心即住不退地故故發心與記三密記有菩薩未得記而行六度功德滿足天龍八部皆作是念此菩薩幾時當得菩提劫國弟子眾數如何佛斷此疑即與授記舉眾皆知此菩薩獨不知四無生忍記於大眾中顯露與記也今是適發心記及無生記也此流通中第四意舉昔金龍尊王讚佛發願十千枯魚聞法熏修行經之因今得記莂將來作佛以成圓極之果證驗今日若親弘經若為外護不久得記成佛不虗以勸流通也爾時如來將欲為是至頂禮佛足却坐一面爾時佛告信相菩薩至天人師佛世尊世界轉名淨幢應論四句一名轉土不轉轉名淨幢是也二土轉名不轉如往古釋迦取土名娑婆今釋迦亦名娑婆三名土俱轉如觀音補彌陀處四名土俱不轉如今銀光補金幢光照佛處世界名字如本不異是十千天子聞三大士至清淨無礙猶如虗空爾時如來知是十千天子至出現於世凡一萬佛既云於是世界而無別名即是還名娑婆此乃土轉名不轉一句當如向所釋爾時道場菩提樹神至為我解說斷我疑網疑者夫移山填海非一日之功菩提極果積行方尅忉利暫下無久聽之勞不聞往昔有難思之行行淺記深是故疑惑如餘菩薩者六度菩薩引錐指地無非捨身命處戒忍禪智滿三僧祇若通教菩薩從假入空非止一世修行從空入假動逾塵劫若別教菩薩直行一行動經無量阿僧祇劫況復徧行眾行量不可數尚不獲記少時聞經而得斯決時眾咸疑故樹神發問也爾時佛告樹神至聞此三大菩薩受於記莂現行者捨天宮樂故來聽經聞三大士獲菩提記我昔本誓與其法食三事和合故與其記也此意證成鬼神品初以妙供養供養三世諸佛及欲得知諸佛行處決定至心聽此經典雖有其旨未見其人今十千天子即其人也聞記當果果必有因因金光明生殷重心起功德身心無垢累起般若身猶如虗空起於法身一心中聽三德圓成復有無量功德說不可盡此不得記記與誰乎證經功德意在于此以隨相修指今現行行隨實相而修也有妙善根指於遠緣遠緣實相而種善根也亦以過去本昔發心至阿耨多羅三藐三菩提誓願因緣者流水品云未來之世當施法食也此文對下二品而為廣略略是此中少文除病流水兩品是廣答金光明經除病品第十五此正廣答遠緣繇醫王救疾故言除病品然須了知不獨除於果報病苦義令該收惡業煩惱十種之病故下文云治諸眾生所有病苦悉令除差佛告道場菩提樹神至般涅槃後正法滅已於像法中有王至方便巧知四大增損善女天爾時持水長者家中至書數筭計無不通達是時國內天降疫病至為諸苦惱之所逼切善女天爾時流水長者子至為是眾生生大悲心作是思惟如是無量至時長者子思惟是已衰邁者衰損也捐也邁歸往也謂壯力已往也八十曰耄謂忘亦亂也顫四支動也掉振也几杖者坐則凭行則執杖即至父所頭面著地至而問於父即說偈言云何當知四大諸根衰損代謝而得諸病云何當知飲食時節若食食已身火不滅身火不滅者食飽熱病暫息食消熱復更生故言身火不滅也云何當知治風及熱水過肺病及以等分水過肺病者水多則損肺即是痰病也何時動風何時動熱阿時動水以害眾生時父長者即以偈頌解說醫方而答其子三月是夏三月是秋至代謝增損令身得病時節有二一俗法四時謂春夏秋冬冬為歲末春為歲始而初言夏者或作趣作此言或可答問正是於夏三三而說者一時三月謂孟仲季四時即十二月也若依佛說法一歲三時謂冬春夏夏為歲末冬為歲始何故爾為破保常秋時萬物結實人計為常為樂為破此著故去秋時為開後安居立迦提月安居本名坐夏八月半內已還若是秋時便是坐秋為此義故故廢秋時爾佛法三時亦是三三說也若二二說足滿六時者依俗法四時時本二月土寄四季各十八日本之二月只是陰陽二月一時唯有陰陽二月合成六時正月二月是木王時四月五月是火王時七月八月是金王時十月十一月是水王時臘月三月是陽土寄王六月九月是陰土寄王欲論本月亦二二說若論土寄王亦二二說故言足滿六時也若依佛法解二二說者佛法有三時時有四月各有初分後分從臘月十六日至二月十五日此初分春時從二月十六日至四月十五日此二月是春後分從四月十六至六月十五日此二月是夏時初分從六月十六至八月十五此是夏後分從八月十六至十月十五此二月是冬時初分從十月十六至臘月十五此二月是冬後分故言若二二說足滿六時也又云正月三月是陽月二月四月是陰月五月七月是陽月六月八月是陰月九月十一月是陽月十月臘月是陰月故言若二二說足滿六時此還依俗法以奇偶之數分陰陽也三三本攝依俗法者正月是春分本月攝後兩月悉屬春分四月為夏本月攝後兩月悉屬夏分七月為秋本月攝後兩月悉屬秋分十月為冬本月攝後兩月悉屬冬分三三本攝也又云正月二月正是春時木於中王土寄三月攝屬春時四月五月正是夏時火於中王土寄六月攝屬夏時七月八月正是秋時金于中王土寄九月攝屬秋時十月十一月正是冬時水於中王土寄臘月攝屬冬時土寄四季正時為本各三月竝攝於土故言三三本攝主攝於客客是土也依佛法言三三本攝者本時各三月既廢秋時以秋之三月各配入三時時則四月論本則三論攝則一故言三三本攝也問四時各有三月此是四三本攝云何三三本攝答三為一數以三而數故言三三為本爾隨是時節消息者時如上說或四或三或二或攝等種種不同隨時以意消息斟酌去取若依佛法無秋時而言秋時發病此云何釋從八月半已還隨俗名秋而夏時攝八月下半已去隨俗名秋冬時攝隨時消息者二法之間而斟酌也代謝增損者春動肝病肝屬木木春王則可治春動脾病脾屬土木尅土此難治夏動心病心屬火火夏王此可治夏動肺病肺屬金火尅金此難治夏末冬初於秋分中動肺病肺屬金金秋王此可治若動肝病金尅於木此難治冬動腎病腎屬水水冬王此可治若動心病水尅於火此則難治論四大增損大略如此有善醫師隨順四時至隨病飲食及以湯藥犯觸有六一多坐二多眠此二多致痰宜多行徛散之三多行四多徛五多語生風病宜多眠治之六多淫生一切病即等分病也若火少痰多若火多即熱壯若風多吹火成熱病若風多吹痰成冷病三事若等無病飲食得病者亦有六一過量食二少食不足而止三過飢時食四逆時食未饑強與食也五妨食如食肉飲生乳使人癩六不曾食而強食如南人飲漿北人飲蜜苦菜和蜜令不結男豬膏煎白鷺肉令人癩若患熱而飲酒食小麥生牛肉令人失明吐血痢血若病痰而飲甜肥醎酸令人𠲿鼻多汁又㿃痢也六大者是六腑大腸小腸膽胃三焦兩膀胱也多風病者夏則發動至其肺病者春則增劇四月五月是風生時六月七月是風起時八月九月是風滅時六月七月是熱生時八月九月是熱起時十月至正月是熱滅時八月九月等分生時十月十一月是等分起時十二月正月是等分滅時十月至正月是痰生時二月三月是痰起時四月至七月是痰滅時痰是水病肺也夏日動風者夏日毛孔開通外風得入內風動也熱病秋動者毛孔閉塞熱伏於內不得行故成病等分冬動者春時動水肺病不差至夏復動風風病不差至秋復動熱熱病不差至冬俱動一切病故也二月三月是痰起損肺肺病動也有風病者夏則應服至肺病春服肥膩辛熱風病夏服肥膩鹹酸熱食者夏月毛孔開通具以肥膩潤塞之令風不得入醎酸性熱能消水令體堅實治於風虗熱食流汗引風令出又治虗冷風不得進冷甜是酥乳等能治熱也等分冬服甜醋等除風也肺病服肥膩塞毛孔令水不得入熱能焦水宣通故能治肺病也飽食後則發肺病至如是四大隨三時發飽食發肺病食既多則腸胃盈滿故發肺病食消發熱者如食沃潤則熱病伏食消無潤熱病起也消已虗疎風氣入體故發風也但舉病發者以病顯藥當用妙藥治也風病羸損補以酥膩至籌量隨病飲食湯藥風疎補酥膩鹹除風甜除熱肺帶風水宜吐也善女天爾時流水長者子至平復如本氣力充實善女天復有無量至所有病苦悉得除差此品事醫意含法藥除病不一非可卒陳今約觀心略申其意三毒等分是內病數息不淨慈心因緣是法藥宜聞法藥得悟者信行人病差也作觀研心得悟者法行人病差也眼是春時舌是夏時鼻是秋時耳是冬時身是四季攝屬諸時妙好五欲增貪病麤惡五欲損貪病妙好五欲損瞋病麤惡五欲增瞋病平平五欲增癡病違順五欲損癡病總三種五欲增覺觀病偏動三種五欲損覺觀病是為增損之相也犯觸者違情犯瞋順情犯貪不違不順犯癡總三犯覺觀慢時即發瞋求須時即發貪僻解時即發癡放逸時即發覺觀慈心治瞋不淨治貪因緣治癡數息治覺觀前說五欲三受俱從外境為四分照發之緣復舉慢等內心惡習為四分觀發之因皆所觀境即是病相慈心等四觀正明能觀四種法藥所謂對病施藥服藥則病除耳仍須了知語似三藏停心之法意則不然何者以四分名通界內外數息等四四教行人無不修證今約此論彌顯除病結緣之意金光明經卷第三
