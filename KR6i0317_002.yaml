body:
  text: 明鹽官安國寺比丘受汰集金光明經卷第二北涼三藏法師曇無讖譯金光明經四天王品第六四天王者上升之元首下界之初天居半須彌東黃金埵王名提頭賴吒此翻持國領乾闥婆富單那南琉璃埵王名毗留勒叉此翻增長領鳩槃茶薜茘多西白銀埵王名毗留博叉此翻雜語領毗舍闇毒龍北水精埵王名毗沙門此翻多聞領夜叉羅剎此四王聞經歡喜各領五百眷屬發誓弘經從此標章故稱四天王品觀心釋者四諦理是四天觀四諦智為四王照事即理護四諦境名護國了縛為脫護心數名護眾生世者他也為他說心數名護他眾生八部者苦諦下有利鈍見思法華指此為鬼神乃至滅諦下亦有見思是為八部若不照四諦理則見思侵害心王毀損境界境智俱為鬼神所惱能觀苦集控御見思則國安民寧自護護他莫不如是爾時毗沙門天王至胡跪合掌白佛言先標北方天王者西土以北方為上也偏袒者西方之禮弟子詣師必須偏袒表有執役世尊是金光明至眾經之王諸佛世尊之所護念法性之理佛所護念文詮此理故言經王既稱經王知是歎體莊嚴菩薩深妙功德至亦為護世之所讚歎約體修行能令菩薩具二莊嚴成于極果既言莊嚴知是歎宗世天生天淨天義天皆宗仰極地施三業供養恭敬是身歡喜是意讚歎是口此經能照諸天宮殿至無量無邊百千苦惱文四初天趣次是經下三惡趣諸河三趣沉沒猶如大河焦乾枯竭者滅三惡苦也三能除怖畏去是人趣初句是總次別明破三障惡怨賊即刀兵他并饑饉疾疫名三災是報障惡星是業障業來責報故惡星現憂惱是煩惱障四舉要下總指九界眾生無明未盡通有熱惱此經能除如月清涼知是歎用世尊是金光明增至益身力心進勇銳具諸威德繇聞此經獲于四益身益光明力益勇猛心益增進德益尊嚴理獲二益謂法身慧命皆得增長繇國弘經致斯法潤寧得不護世尊我等四王能說正法至為世法王以法治世此義正與觀心相應以四諦智護四諦境即是修行正法以四諦智導諸心數使之不行故名行般若波羅蜜即是能說正法內有如此護國所以名護世王正治國土爾世尊我等四王及諸天至遮諸惡鬼噉精氣者此亦與觀心相應心王帥心數黨降伏見思利鈍諸使如諸天王共眷屬遮諸惡鬼如轉輪王與七寶千子有所至處四方歸德四王共五百所臨之地何惡不除邪世尊我等四王二十八部至是故我等名護世王以報得天眼徹視無幽不燭防萌杜漸何惡不除邪若此國土有諸衰耗至衰耗之事悉皆滅盡一若王國多灾我以智䇿勸法師往或威神勸或現形勸或降夢勸法師若往廣宣此經如日出朝陽零霧自歇此勸外緣世尊如諸國王至為除衰患令得安隱次王心無智照灾承闇入若有明慧變怪不生師既秉法來儀王須專心聽受王若勤聽天亦勤護所以加于可加護于可護一人有慶賴及萬方王身興國安隱無患此內因也若外雖有弘法人王內心不殷重則不和合不能禳灾也世尊若有比丘比丘尼至一切安隱具足無患二者王無惠施則寡于福祿如不勤田倉廚少穀勸王傾財供給四眾福資于王舉國眷屬一切無患世尊若有四眾至欽尚羨稱讚其善三者王身無先王之德行口無先王之法言所以臣民不從鄰國不詠今勸王三業供養恭敬是身業尊重是意業讚歎是口業夫高以下為基辯以訥為師屈尊敬卑功亦大矣以天威力使鄰國遙崇羽檄稱讚歌詠羨慕三業顒顒爾時世尊讚歎護世至無量百千萬億諸佛上四王所讚經體宗用既合佛證三德妙理故佛述而成之言徧讚百千諸佛者體宗用三既是法性豈有一佛不從此生故舉多讚成于一也於諸佛所種諸善根上明護國之繇繇聞經獲益佛述今益良繇先種發心畢竟二不別如是二心前心難是故敬禮初發心此舉前以成後述後以顯前說于正法修行正法以法治世為人天王上云能說能行所以名為護世佛述成亦爾汝等今日長夜利益至滅其苦惱與其安樂上云以淨天眼過于人眼佛述長夜利益天眼夜照不假日光故言長夜汝等四王及諸眷屬至護持去來現在諸佛正法上直言護國佛今加讚是護三世諸佛正法也汝等四王及餘天眾至為除衰惱施與安樂上云請法師入境攘惡此功歸己能却修羅之陣汝勸王聽經供給四眾佛述其內智外福實是消伏諸苦能致安樂爾時四王復白佛言至他方怨賊亦使退散一是經流布之處其王自能頂受又供給四眾者我及眷屬誓當隱形令其顯益言天律治世者師古治民則天行化罰必當罪賞必當功名天律也若有人王聽是經時至況復當能有所破壞二者惡鄰興兵侵斥善國我當隱形起諸怖懅種種難起令其軍兵顯然退散尚不擾邊況復壞中四兵象馬車步也規往討伐者規求也討誅也有鐘鼓曰伐爾時佛讚四天王等至無諸凶衰鬬訟之事上隱形護國欲使經弘佛述隱形是護三寶我是佛寶修習菩提是法寶諸王無鬬訟是僧寶述其護一而能成三也四王當知此閻浮提至一切惡事悉皆消滅上以天威懅之天力退之似若憎惡愛善佛勸慈心平等向之為惡者自懅為善者自豫非薄惡而厚善成其懅退之意也又勸諸王各守本業住境自樂勿起貪企諸王和則民生無夭法興盛則諸天被熏佛告帝釋鬬諍因緣人天損減善能慈和天下非止供養于我則是供養三世如來非止安于一王徧安諸王非止安于一國徧安一切故以慈和述成第二意也楚撻者楚一名荊可以為杖撻擊也沃濕也美也亦柔也壤土也時不越序者四時和也心無貪悋者無貪故不多求無悋故能惠施后妃采女者天子一后三夫人九嬪妃二十七世婦八十一御女風俗通云采女者采擇其容色之女也爾時四天王白佛言至若有人王欲得護身及后妃采女諸王子等宮殿屋宅得第一護身所王領㝡為殊勝具不可思議王者功德欲得攝取無量福聚國土無有他方怨賊無諸憂惱及諸苦事世尊如是人王至應生恭敬謙下之心應當莊嚴第一微妙至無數微妙幢幡寶蓋當淨洗浴以香塗身至謙下自卑除去驕慢正念聽受如是妙典至采女眷屬生慈哀心和顏與語勸以種種供養之具供養法師是王爾時既勸化已至于說法者倍生恭敬一一如數對上六願上欲安身今示莫放逸制心則身安也上欲安宮殿今示嚴法堂旛蓋映于上香華麗于下三寶受用則栢梁無灾上欲王領殊勝今示洗沐香塗敦恭去慢一身敬于此八紘休于彼上欲攝取福聚今示正念聽經能致無量功德天神竭其力覆地神竭其力載鬼神竭其力護臣民竭其力愛上欲安妻子今示和顏與語勸其興福內外修善感益事多上欲得國無憂苦今示應自喜慶自勵忘疲倍作利益一人既悅則四海謐然此之謂也爾時佛告四天大王至百千億那由他諸佛世尊上直示心不放逸今加示羽儀出宮迎候步步值那由他佛方法既備體亦彌安躬出者躬親也復得超越如是等劫生死之難上止一世無憂苦今則超爾許生死之難蓋言劫數如值佛之數也復于來世爾所劫中常得封受轉輪王位隨其步步輪王有玉女千子悉無怨對爾許劫中妻子常安也亦得如是現世功德不可思議自在之力常得㝡勝極妙七寶人天宮殿在在生處增益壽命至成就具足無量福聚汝等四王如是人王至于阿耨多羅三藐三菩提已為得值百千萬億那由他佛至離三惡道苦我今已種百千無量轉輪聖王釋梵之因已種無邊善根種子至已集無量無邊福聚後宮眷屬已得擁護宮殿諸衰悉已消滅國土無有怨賊棘刺他方怨敵不能侵陵棘兵器也與戟同刺殺也汝等四王如是人王至能以正法摧伏諸惡此總結成六法六願皆今具足者若能屈己迎候至心聽法即是六願六法又廻利施天亦即能令六願六法成就滿足也爾時四王白佛言世尊至燒種種香供養是經是妙香氣於一念頃至亦照一切諸天宮殿香作金光者人王心存至典則諦智兩冥色心不二故香隨智徧一一皆金光明廻施必得是故天宮相現香至天宮龍宮鬼神等宮總至三法界爾仍須了知解脫所燒之香非法界者何能周徧三趣之體非法界者何能承受摩醯首羅此云大自在金剛密跡者正法念經云昔有國王夫人生千子欲試當來成佛次第故拘留孫探得第一籌釋迦當第四籌乃至樓至當千籌第二夫人生二子一願為梵王請千兄轉法輪次願為密跡金剛神護千兄教法世傳樓至化身非也乃法意王子耳摩尼䟦陀此云威伏行阿耨達此云無熱惱娑竭此云醎海佛告四王是香蓋光明至金光普照亦復如是先述香光非但至天宮等三法界徧至百億諸宮又至恒沙佛上總之徧至十法界也百億非非想天者夫百億即大千界也但同一四禪及四無色三禪統中千界以大千言之則有一千三禪也二禪統小千界則有百萬二禪唯四洲至初禪則有百億今非想亦言百億以下望上言之耳又恐番譯之訛也諸佛世尊聞是香氣至於阿耨多羅三藐三菩提爾時十方無量無邊至百千萬億那由他佛人王運善奉施諸天為諸佛所讚上讚因成此讚果滿勤修下明修苦行善能下壞外道降魔怨是莊嚴道塲也覺了下成正覺善男子下轉法輪此並果上之事如瑞應經廣明爾時四天王復白佛言至所止宮殿講法之處大梵天王釋提桓因至所止宮殿講法之處世尊我等四王及餘眷屬至能為無上大法施主以甘露味充足我等至諸惡灾患悉令消滅世尊若有人王於此經至減損天眾增長惡趣世尊我等四王至諸舊善神皆悉捨去我等諸王及諸鬼神至其地無有可愛樂處流星者星說曰絕迹而去曰奔星光迹相連曰流星博蝕案漢書天文志作日月薄蝕孟康注曰日月無光曰薄韋昭曰氣往迫為薄虧缺曰蝕京房易傳云日月赤黃為薄釋名云日月虧曰蝕謂稍侵虧如蟲食草木葉也虹者爾雅云螮蝀虹也雙出鮮盛者為雄雄曰虹暗昧者為雌雌曰霓又虹攻也謂純陽攻陰義也世尊我等四王至生如是等無量惡事統上王不弘經故無法食不聞法食故天神捨離天神捨離故惡鬼亂行鬼亂行故灾起然則灾起繇鬼亂行鬼亂行繇諸天捨離天離神捨繇不聞法食不聞法食繇王不弘經世尊若有人王至讀誦受持是經典者我等四王及無量鬼神至至心聽受是經典故如諸梵天說出欲論至是金光明於中㝡勝三論者四韋陀論說梵事毗伽羅論說十善事僧佉衛世師勒沙婆論說學通事云云所以者何如來說至悉是如來正徧知說如來過於百千億那由他至演說如是金光明經以大悲力故等者用無緣大悲普覆法界故超梵王四等之心以難思苦行積劫利物故超帝釋十善之因若閻浮提一切眾生至尊重讚歎是經一切眾生等者世間謂五戒十善十二門禪等出世間者四教法門三乘修證也國事者禮樂征伐治世育民之事也造世論者如上三論及下正論等也皆因此經者乃教行理三種經也故新本云欲生人天欲得四果支佛欲得佛皆依此經懺悔滅障方得成就若探取化意即是於一佛乘分別說三但以此經部在方等教猶屬通理就人分未免異趣故欲令等言隨其五乘而得安樂也爾時佛復告四王至滅其衰患而與安樂而與安樂是述成舉興勸滅其衰患是述成舉衰勸若有人能廣宣流布至續復當得廣宣是經爾時四天王即從座起至於世尊前以偈讚曰佛月清淨滿足莊嚴佛日輝曜放千光明夫三身有通別依文是別空是法身以空無明暗日月所依別喻法身體本周徧日是報身以日能破暗別喻報身三惑淨盡月是應身以月能盈昃別喻應身隨機勝劣問經無空字何以取喻答下文云佛真法身猶若虗空且日月必依於空故以空日月三別對三身耳通意者每喻各自具於三義空是法身日是報身水日是應身以日上必依空下必現水此之三義則顯報智圓具三身是就三般若論三身也空是法身月是報身水月是應身以月亦上必依空下必現水可顯應用圓具三身是就三解脫論三身也空是法身日中空是報身水中空是應身以太虗空是日所依空天日水日當體含空此之三空則顯法體圓具三身例之空是法身月中空是報身水中空是應身以月所依空天月水月其中含空亦顯法體圓具三身空徧日月兩說三身者乃就雙照中道而示此則三軌以論三身也後結歎文空是法身月是報身水月是應身空是法身日是報身𦦨是應身化法是法身化主是報身化事是應身各各具三其義宛爾故文云無有障礙即通意也如來面目㝡上明淨齒白無垢如蓮華根謂目與齒功德無量猶如大海至百千三昧無有缺減初二句總標有喻有法次四句是別歎二句是智二句是斷淵海也管子曰水出於地而不流曰淵足下平滿千輻相現至微妙清淨如鍊真金謂平與網所有福德不可思議佛功德山我今敬禮夫相好不獨在應身報法亦通莊嚴父母生身者應相好也莊嚴尊特身者報相好也莊嚴法門者法身相好也以身相是一隨見成三藏通人但言偏空所見佛相謂繇正習搆造而成相非奇特但能少勝輪王而已以不知心現見從外來取色分齊故名生身此乃如來曲順凡小示現此身故名為應別教人能信中道妙色妙心隨緣變造所見佛相知從心現無有分齊或現大身十蓮華藏世界塵相或現八萬四千相好或時祇於丈六三十二相令其機緣無分齊見不同藏通分齊之身故名尊特此乃如來修道所得故名為報圓教人了大小身及多少相皆性本具修德無功相雖是色色即是心故起信論云色性即智說名智身智性即色說名法身今從即智名法門故以八萬四千陀羅尼為髮乃至定慧為足以即色故故得名為法身相好今言歎智斷即法身相好也然須了知就機故論法報應三淺深優劣而前前者不知後後後後者必見前前據文云無有障礙知非獨歎一身良繇天王圓見三身與妙三德無二無別欲彰此義故發是歎應是解脫豈隔二德報法準知若達此意方是深入金光明法門也佛真法身猶如虗空至是故我今稽首佛月偈初標佛月今結先佛月為三身次結三身通融故言無有障礙次結佛日故言如𦦨次結佛化身即是四身義故言如化皆具三身四身則是無障礙也結竟即禮禮於佛月亦是禮佛日佛化也品初歎三章云金光明微妙經典顯不縱橫今結三身辭異義同佛真法身即是體佛月清淨即是宗應現水月即是用一三三一亦非縱橫以初以後顯于中間句句無非譚秘密藏天王天辯其妙若此爾時世尊以偈答曰此金光明諸經之王甚深㝡勝為無有上此答其法身十力世尊之所宣說汝等四王應當勤護此答其報身以是因緣是深妙典至所有惡趣無量諸苦閻浮提內諸人王等至及其國土欲令豐盛應當至心淨潔洗浴至無量眾生安隱快樂譬如寶樹在人家中至隨意能與諸王法寶是金光明微妙經典至十方諸佛常念是經若有演說稱讚善哉至增益天眾精氣身力統上歎經用是答其應身前天王所以讚佛者以佛能說法也今法王所以讚法者亦以法能成佛故耳爾時四王聞是偈已至隨逐是說法者而為守護悲喜者悲昔不聞喜今得聞悲他不聞喜自得聞涕淚橫流者涕即淚橫謂交橫文選悲舊鄉之擁隔兮涕橫墜而未禁怡解者怡謂和悅解謂舒散也金光明經大辯天品第七辯有四種小辯無量辯雙辯大辯無漏法名小辯恒沙法名無量辯備二種名雙辯雙非雙照名大辯此天住智慧莊嚴法門自住大辯以自在力隨機而授悅宜對悟若一若二若三若四令得四悅乃至四悟故名大辯對佛發願以大辯加於說者故以是標品爾時大辯天白佛言至能與總持令不忘失初加法師以樂說辯才謂於一字中說一切字於一語中說一切語於一法中說一切法隨可度者而有所益也莊嚴次第是辭辯種種莊嚴言語善巧也大智是義辯知諸法義所歸趣處也總持是法辯智慧通達諸法名字也若有眾生于百千佛所至是妙經典令不斷絕流布不絕加其能化之道無人無所化無道無能化因緣和合化道不絕也復令無量無邊眾生至阿褥多羅三藐三菩提聞經至不退轉是加因益必定得菩提是加果益文言雖略誓願弘深為益大矣金光明經功德天品第八此天住福德莊嚴法門攝一切法而以功德為首故言功德天又能與說者所須無所乏少故名功德天又令說者晝夜思惟是經深義故名功德天又令聽者速成菩提具此眾義故名功德天品應知大辯與功德天咸皆證入金光明法門皆能徧攝一切法等但引物偏好為行不同故彼以智為首此福為首爾時功德天白佛言至三惡道苦悉畢無餘及餘資產者即飲食衣服臥具醫藥四事之外一切資具產生之物也世尊我已於過去寶華功德至璧玉珂貝悉無所乏述過去世值佛修證金光明法門故能今日隨弘經處有求皆與寶華等八字別號也如來等通號也無虗妄名如來良福田名應供知法界名正徧知具三明名明行足不還來名善逝知眾生國土名世間解無與等名無上士調他心名調御丈夫為眾生眼名天人師知三聚名佛具茲十號名世間尊種諸善根者以照金光明微妙之智為諸善之根也璧玉所琢器也珂貝螺屬也若有人能稱金光明至多與資生所須之物世尊於此北方毗沙門至此即是我常止住處阿尼曼陀此云有財若有欲得財寶增長至供施於我散灑諸方爾時當說如是章句波利富樓那遮利一至阿㝹婆羅尼十三是灌頂章句必定吉祥至香華供養十方諸佛灌頂章句者以法性水灌十地頂受法王職今密譚此法故名灌頂必定是般若德吉祥是解脫德真實不虗是法身德以此三德讚灌頂義等行謂具行諸行中善根謂行一行八戒者即在家人一日一夜也於五戒上更加不著華香不觀聽伎樂不止高牀此八是戒不過中食是齋常為己身及諸眾生至令我所求皆得吉祥此乃奉供及誦密言邀請意也若為自身受五欲樂希望財寶即輪迴業眾聖所訶尊天寧護令為己他成菩提故其所剋獲非生死因當依此文修今行法自於所居房舍屋宅至布散其地以待於我阿蘭若此云無諍以其所居不與世諍即離聚落五里處也又有達摩阿蘭若謂說諸法本來清淨因名其處為法阿蘭若今經所指該其二也我於爾時如一念頃至即得具足悉受快樂若能以己所作善根至隨其所求令得成就應當至心禮如是等至法上菩薩亦應敬禮東方阿閦如來南方寶相如來西方無量壽佛北方微妙聲佛金光明經堅牢地神品第九諸天或住善權方便道為眾生法父此天住善實智度道為眾生法母一義也譬如陰陽覆載卉木智度養育出生眾善二義也餘度各有所主未亡未泯實智照了無相無名三義也餘度有等有上智度無等無上是究竟度四義也智度法門常無改變義曰堅牢常也能荷樂也能生淨也名之為地德力自在我也稱之為神從此等法門故名堅牢地神品爾時地神堅牢白佛言至得服甘露無上法味聚落者落居也人之聚居故名聚落山澤者下有水曰澤宿衛謂止宿衛護增益氣力而此大地深十六萬至豐壤肥濃過於今日以是之故閻浮提內至美色香味皆悉具足眾生食已增長壽命至成就如是種種等已壽命色力辯安謂之五果繇食而致所作事業多得成辦至應心適意隨其所樂是諸眾生得是威德至持是經者四部之眾我於爾時當往其所至廣令宣布如是妙典凡約八事展轉增長繇聞法故法味增長法味增長故氣力增長氣力增長故翻地味增長地味增長故諸物增長諸物增長故眾生五果增長五果增長故修行增長修行增長故供養增長供養增長故弘通增長耳何以故世尊是金光明至服甘露無上法味已閻浮提地縱廣七千由旬豐壤倍常南北曰縱東西曰廣世尊如此大地眾生所依至增長一切所須物已令諸眾生隨意所用受於快樂種種飲食衣服臥具至依因於地悉皆具足凡約五事展轉增長以經力故我眷屬增長眷屬增長故地味增長地味增長故諸物增長諸物增長故眾生快樂增長快樂增長故依報皆具足具足亦名增長耳是故世尊是諸眾生至往法會所聽受是經既聽受已還其所止至常生天上人中受樂是諸眾生各於住處至及稱是經首題名字世尊隨是眾生所住之處至悉得增長滋茂廣大令諸眾生受於快樂多饒財寶好行惠施心常堅固深信三寶凡約六事展轉增長以知我恩故專聽增長專聽增長故功德增長功德增長故教他增長教他增長故地味增長地味增長故受樂增長受樂增長故信施增長耳爾時佛告地神堅牢至隨意往生三十三天地神所說止是今世增長如來述成文雖略意極長遠準下可知地神若有眾生為欲供養至不可思議微妙快樂供養等是在人世是人下往天世日夜下至出世也雖受天樂住樂法界故無所受是故名為不可思議微妙快樂蓋從人世至天世從天世至出世長遠之義若此爾時地神白佛言世尊至在法座下頂戴其足世尊若有眾生至是妙經典令不斷絕是諸眾生聽是經已至三惡道苦悉斷無餘金光明經卷第二
