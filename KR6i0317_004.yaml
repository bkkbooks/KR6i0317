body:
  text: 明鹽官安國寺比丘受汰集金光明經卷第四北涼三藏法師曇無讖譯金光明經流水長者子品第十六文云一能流水二能與水與水者與安樂水也一世安樂二出世安樂世安樂者如象負水濟彼枯魚是也出世安樂者如發誓言於未來世當施法食與菩提記是也流水者流除苦惱水也一果報苦惱二業因苦惱流除果報苦惱如治諸病人救彼渴魚是也流除業因苦惱者授三歸說十二因緣讚佛十號是也請父求方欲成流水之義從王借象欲成與水之義今單以流水題品者文中既彰與水之義題品須安流水之名經文與題二名互顯出經者之巧為若此也長者者具十種德名長者一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸子者持水之子故經云持水大長者家中後生一子名曰流水故言子也此文是斷疑中第三結緣之近繇佛告樹神爾時流水長者子至多設福業修行布施尊重恭敬是長者子至必是菩薩善解方藥善女天時長者子有妻至一名水空二名水藏時長者子將是二子至我當隨後逐而觀之時長者子遂便隨逐至見是魚已生大悲心時有樹神示現半身至倍復增益生大悲心善女天時此空池為日所曝至還到池上與作陰涼恃依也作陰涼已復更推求至猶不能成況我一身捕捉也決棄其水決音穴廣雅云穿也說文云下流也周易藩決不羸亦音穴也時長者子速疾還返至利益眾生令得快樂廐馬舍也釋名云廐聚也馬之所聚也是時流水及其二子至水遂彌滿還復如本時長者子於池四邊至求索飲食我今當與彷徉上扶方反下以章反廣雅云徙倚也又徘徊也善女天爾時流水長者子至與此魚食令其飽滿未來之世當施法食復更思惟曾聞過去至思惟是已即便入水作如是言南無過去至生緣老死憂悲苦惱先稱十號次說因緣十號在悟在果因緣在迷在因迷悟因果其名雖殊而體不異以十號果是究盡三德十二因緣是本來三德三德不改因果寧殊故普賢觀云大乘因諸法實相大乘果諸法實相諸法是修二實相是性一此三圓融不縱不橫全體為因全體為果眾生雖迷十號無減諸佛悟極十二不虧以世間相皆常住故今先唱果果理已顯令其解生初稱寶勝乃是別名名於一佛如來等十乃是通名三世十方佛佛皆具若以通從別合得名為寶勝如來寶勝應供等此十通號今約三三及一總結以銷十號令知一一無非祕藏初三以如來為首即法身中三也如來是真如屬法身應供利生是解脫正徧知具二智是般若以法身必具二德故也次三以明行足為首即解脫中三也三明之行是解脫善逝能趣極是般若解三世間一一常住是法身以解脫必具二德故也後三以無上士調御丈夫為首即般若中三也見性名丈夫故當般若天人師軌訓眾機是解脫佛是復本大覺是法身以般若必具二德故也此九即三此三即一一無一相三九宛然三千世間九世剎那一多延促究竟自在故言世尊十二因緣束為三道無明愛取三支屬煩惱道行有二支屬業道識名色六入觸受及生老死屬苦道此雖昏迷繫縛輪轉而全體即是三因佛性皆不可思議隨人觀察顯發不同故大經說下中上智觀此乃得三乘菩提若上上智觀得佛菩提以前三教智有思議故觀十二止得三乘唯有圓教不思議智體無明等即是性染非佛天人修羅所造一一常住當處圓融方曰因中具於果性又玄文中三道三識雖本有位與果後三德無二無別得此意已方可分別十二別名無明謂不了六受即空假中行謂依不了心動作業行識謂業牽中陰識託母胎名色謂二滴為色心但有名六入謂名色增長成六入根觸謂六根對外為塵所觸受謂觸生三受苦樂平平愛謂迷三受故於樂染著取謂愛染纏綿四方求索有謂繇取造業須有來報生謂有業既熟未來陰興老死等謂生須變滅悲惱縈纏此十二支或約三世或約二世或約一念雖三不同皆以十二而對三道即事而理一一究竟清淨自在不縱不橫而高而廣如是觀者得佛菩提略三歸者義已具也蓋三寶三德體本不異既稱南無寶勝十號豈非歸命果上三德復說甚深十二因緣乃是心依因中三德迷悟極際三德無差一體義備三皆具足常樂我淨真是歸依三寶義究竟成當知讖師意趣深妙善女天爾時流水長者子至既命終已生忉利天凡初生天以自業力有三種念一自知從其處死二自知今此處生三自知先作何業得來生天既知曩事故下酬恩既生天已作是思惟至隨意自在受天五欲報恩有二義一事二理事者真珠四邊報水飲食因緣十號等四種澤也理者祇于四事而解四德故成理益以十千魚繇戒緩故受鱗介身繇乘急故今遇大乘真善知識故能于事深解妙理受食得命即表真常受水得樂表涅槃樂於十二棘林解自在我依十號法獲天報財於世淨命解性淨德此四法益因流水得故持四萬真珠瓔珞報恩供養食等四事既表理益四萬珠瓔豈但事供蓋表千界萬如一一皆具常樂我淨即四十千真珠瓔珞非嚴而嚴嚴于法身此乃財供成於法供所以名有妙善根為得記緣也時閻浮提過是夜已至何緣示現如是瑞相長者子言我必定知至王聞是已心生歡喜爾時世尊告道場菩提樹神至現半身者今汝身是第五結會古今者昔佛疑魚數樹神定判十千今神疑行淺記深佛為說妙因緣今昔相關故結會也羅睺羅此云覆障以六年在胎故立斯號然本迹事傍文思之十千今昔必是所化餘皆能化此之能化據華嚴等諸經所說皆是劫海修其實因熟其十千令今得脫若取法華久成之意皆是迹中接此等機令今得記耳金光明經捨身品第十七捨義甚多謂財位壽命今獨以身當名者此從正要得名受者須身餘則非要施者正捨身餘旁捨爾故言指身品夫行門無量根繇宿熏四種三昧逐人所尚於隨身意善行六度樂行檀者於身命財無所悋惜自行教化隨喜讚歎皆在於施若於善師及依實教修檀行者體能施心及受施境所施身等即空假中事行理觀合一而修助道正修相資而進庶四悉俱成二利皆得故特譚本事令人効行捨於身命爾時道場菩提樹神至為利眾生受諸快樂問者上聞大士治病救魚實為曠濟魚關未來法食之誓獲成佛記例病差者定於後世為解脫機是則皆蒙二世之益時眾願聞亡身殞命感深契極之事行苦而果樂可得聞邪是故請問爾時世尊即現神足至眾寶羅網彌覆其上爾時大眾見是事已生希有心爾時世尊即從座起禮拜是塔恭敬圍繞還就本座爾時道場菩提樹神至何因緣故禮拜是塔佛言善女天我本修行至阿耨多羅三藐三菩提爾時佛告尊者阿難至六波羅蜜功德所熏爾時阿難聞是教勑至是中舍利其色紅白佛告阿難汝可持來此是大士真身舍利爾時阿難即舉寶函還至佛所持以上佛爾時佛告一切大眾至說是舍利往昔因緣阿難過去之世有王至小子名曰摩訶薩埵摩訶羅陀此番大無罪文殊問經云羅陀翻為中摩訶波那羅或云此翻大度摩訶提婆此翻大天摩訶薩埵此翻大心是三王子於諸園林至漸到一大竹林憩駕止息第一王子作如是言至能令行人安隱受樂時諸王子說是語已至身體羸瘦命將欲絕適產七日者見虎子頭上有七點知已七日出山海經又云七日眼開又七日不食必死虎既垂死知是七日或云鬼神示悟如樹神數魚第一王子見是虎已至作是觀已尋便離去爾時第三王子作是念言至與諸眾生無量法樂觀有二種一助觀二正觀從初至甚可患厭是助道觀也以三藏教假想對治戀著依正之心從是故我今下正觀也至無諸塵累等即空觀無量禪定至諸佛所讚即假觀從證成如是至法樂即中觀說乃前後修必一心是時王子勇猛堪任至滅生死怖眾惱熱故先作方便次作是言下正起誓六句不出四弘初二依滅諦發成佛願三四依道諦發悲智願第五依苦諦發度生願第六依集諦發斷惑願此依界外滅諦為首驗發圓心也是時王子作是誓已至於高山上投身虎前是時大地六種震動至噉食食其肉唯留餘骨六種震動者謂動起涌三種是形震吼擊三種是聲今於形聲略言其二故言震動爾時第一王子見地大動為第二王子而說偈言震動大地及以大海至必是我弟捨所愛身第二王子復說偈言彼虎產來已經七日至今者我天為何所在爾時王妃於睡眠中至心大愁怖而說偈言今日何故大地大水至失我心中所愛重者爾時世尊欲重宣此義而說偈言我於往昔無量劫中至常捨難捨以求菩提我念宿命有大國王至見新產虎饑窮無食時勝大士生大悲心至儻能還食自所生子即上高山自投虎前至世間皆闇無有光明是時二兄故在竹林至然後蘇息而復得起是時王子當捨身時至心生愁惱似喪愛子於是王妃疾至王所至夢是事已即生憂惱我今愁怖恐命不濟至即時悶絕而復躃地王聞是語復生憂惱至哀哭悲號聲動天地爾時城內所有人民至我子今者為死活邪爾時王妃念其子故至不令我子喪失身命我所見夢已為得報至三子之中必定失一爾時大王即告其妃至汝今且可莫大憂愁大王如是慰喻妃已至舉首號叫仰天而哭先所遣臣尋復來至至不久當至令王得見須臾之頃復有臣來至唯有骸骨狼藉在地是時大王聞臣語已至復起舉首號天而哭復有臣來而白王言至乍復讚歎其弟功德是時大王以離愛子至可使終保餘年壽命一亡二存對竝思忖亡者叵尋存者宜取爾時大王駕乘名象至速令二子覲見其母佛告樹神汝今當知至及舍利弗目犍連是輪頭檀或閱頭檀此云淨飯摩耶此云天后調達亦提婆達多此云天授父母從天乞子天授與之是佛堂弟瞿夷此云明女悉達有三夫人一瞿夷二耶輸三鹿野各有二萬采女五比丘者憍陳如頞䟦提十力迦葉拘利太子陳如十力迦葉二是母親餘三是父親舍利弗此云身子母好身形故母名身是彼之子故名身子目犍連此云胡豆姓也上古有仙居山常採菉豆而食因以命族尊者是彼之後也爾時大王摩訶羅陀至即於此處起七寶塔梵語塔婆此翻方墳或云聚相謂累木石及寶高以為相茶毗後分云佛塔高十三層上有相輪支佛塔十一層羅漢四層輪王塔無復層級以未脫三界故十二因緣經八種塔竝有露盤佛塔八重菩薩七重支佛六重四果五重三果四二果三初果二輪王一凡僧俱蕉葉火珠而已舍利此云身骨是時王子摩訶薩埵至常為眾生而作佛事說是經時無量阿僧祇至阿耨多羅三藐三菩提心樹神是名禮塔往昔因緣至是七寶塔即沒不現金光明經讚佛第十八此品從能所得名能讚是三番菩薩所讚是一佛世尊不同前讚歎品能讚是往世金龍一人所讚是三世極果諸佛能所合標故言讚佛品章安又謂三番菩薩是能讚一佛是所讚一佛是能讚三番是所讚三番是當佛一佛是現佛通而為言皆是能讚皆是佛故言讚佛品次第者因前十七品故有今品何者序品敘大體如來游於無量甚深法性窮源極邊壽量品極果冥深合廣能起大用菩薩修學勸令如懺品滅惡讚品生善空品導成四王至散脂誓願流通說請者之功德正論至善集明說者之功德鬼神至流水說聽者之功德捨身明行者之功德如是等利益出現世者皆是如來大體大智大用金光明力既善始令終初中後竟故諸菩薩等以讚讚佛稱揚教及教主故言讚佛品爾時無量百千萬億諸菩薩至異口同音而讚歎曰從此至金寶蓋剎者正張大其眾滿中菩薩皆讚釋迦教主也供養不出三業投地是身同聲是口口身共暢意業也如來之身金色微妙至迦陵頻伽孔之聲如來之身標起也金色微妙等三句是讚第十四金色光微妙一大相也身淨者即讚第十一身清潔一小相也柔輭者讚第十二身柔輭小身也圓足無垢二句讚第二十身滿足小相亦是讚容儀滿足其音清徹下是重讚梵音一大相亦是兼讚言音深遠小相海也梵聲者譬佛音深遠也師子吼聲者譬佛音無畏也大雷震聲者譬佛音破迷也云六種聲者諸文皆有八音一極好二柔輭三和適四尊慧五不女六不誤七深遠八不竭譯人增減不須和會亦可先舉妙如梵聲者即八音中深遠音也師子吼大雷震即舉不女音也以佛住首楞嚴定常有世雄之德久離雌耎之心故所出音聲能令聞者敬畏天魔外道莫不歸伏也上既已列二種聲下但云六種聲者即舉迦陵頻伽等六種聲也以迦陵頻伽番極好聲故清淨無垢威德具足至光明遠照無有齊限上以大小相間而讚蓋顯身相大小咸徧辭意雖含尊特未彰故今復讚身相光明俱無限齊言威德者正巍巍堂堂之相也智慧寂滅無諸愛習上句讚智下句讚斷世尊成就無量功德譬如大海須彌寶山大論云尊特身佛者巍巍堂堂譬如須彌映臨大海所有大小相好亦巍巍堂堂然如來自行具足三身功德諸菩薩唯讚尊特者上冥下應已攝三身斯出讚者之巧為若此也為諸眾生憐愍心於未來世能與快樂如來所說第一深義體指序品如來所游深廣無際超諸因理故稱第一舉深該廣即甚深無量也宗指壽量極果所得過諸菩薩亦稱第一報法體一深義可知能令眾生寂滅安隱至安住正道無諸憂苦初二句是讚上懺品滅惡寂諸業行之惡滅於果報之苦故言寂滅次二句讚上歎品生善如來敘昔龍尊讚佛意生今日當機之善故能與無量快樂能演無上下讚空品雙導甘露者即長生不死之藥文詮中道妙空實相真諦能過二死迷變可生四德常身故斯理空即名甘露仍繇染體本淨空名妙法從此而入復名法門此先讚能導空法之妙能入等正讚滅惡生善之深言解脫者有二意若就解脫惑業之縛即破惡也若取無染自在之淨即生善也度三有等破惡生善可知如來世尊功德智慧大慈力精進方便功德智慧結上讚能說教主慈悲精進結上讚所說教法法之宗用如是者皆慈悲精進所致也如是無量不可稱計我等今者不能說喻諸天世人於無量劫至無量大海一滴少分我今略讚如來功德百千億分不能宣一若我功德得聚集者迴與眾生證無上道迴向有三義現文有二理含其三爾時信相菩薩即於此會至合掌向佛而說讚言世尊百福相好微妙功德千數莊嚴其身色淨遠照視之無厭至又與眾生上妙快樂色淨遠照下即第十四金色光相光明熾盛下即第十五身光相然二種光相若據生身皆有齊限如云身光面各一丈今云如日千光乃至悉能遠照無量佛土故知信相昔為龍尊讚佛尊特發願未來得值釋迦今日讚佛豈忘其本是則大相小相皆寄尊特而讚也能滅等正讚光明能滅苦與樂諸根清淨微妙第一眾生見者無有厭足如大相中有身端直皮膚薄細舌大覆面齒白齊密眼如金精睫如牛王小相中有鼻高好吼不現耳輪輻相埵成身清淨柔輭等諸根皆見者無有厭足髮紺柔輭猶孔項至如是功德悉已聚集孔項蜂王等皆比髮有紺色如八十好中有髮色青珠好等此繇清淨慈悲無量禪定久皆莊嚴故髮好柔輭相好妙色嚴飾其身至在在示現於諸世界初四句明嚴身克果之用如來下顯攝生感讚之功若相若好隨大隨小悉能調伏令心柔輭受諸快樂故為諸佛所讚其光遠照去正明功德具光明故遠照如日之徧空高廣若須彌顯出大海齒白齊密猶如珂雪至其色微妙如日處空爾時道場菩提樹神復說讚曰言道場菩提樹神者如來得道之場在此樹下故樹以菩提為名今女天依此樹而住故云耳南無清淨無上正覺南無者歸命之辭也清淨者佛性論有二種一性淨本無惑染故二相淨對治離障故今總讚如來中邊智滿法報應圓故謂無上正覺也甚深妙法隨順覺了至獨拔而出成佛正覺初六句是就所覺顯明讚佛法身甚深微妙者法性高廣諸法融妙圓智圓覺徧一切處如來隨順斯理覺了其性故遠離非法非道法即所生果法道即能生因道苟未離無明有所修證皆名為非言一切者即魔外涅槃非法禪戒非道及三乘七方便涅槃非法戒定非道等獨拔而出成佛正覺者所謂出纏大法身也知有非有本性清淨至希有希有佛無邊行有法喻合法中初二句讚報智知者照也有即俗非有即真本性清淨即中以一切種智知照三諦則冥深契廣事理周極名佛無上報智也希有二句讚佛助行功德重言希有者歎美之鄭重也因中戒定有排障敵惡之力名功助發大智成佛大果名德法華云久修業所得即其義也喻中言大海須彌者即喻上報身智行也大海喻智須彌喻行其智冥理窮實相底故方之大海釋論謂智度大海佛窮其底因中萬行積功累德喻彼須彌如華嚴涅槃皆云析骨書經如彼妙高合中智行契理三法一如故曰希有希有佛無邊行希有希有佛出於世至希有如來無量大悲優曇華者具足云優曇鉢羅此言瑞應亦云靈瑞輪王出世時感此華泥洹經云閻浮提內有尊樹王名優曇鉢羅有實無華優曇鉢樹有金華者世乃有佛故云時一現耳無量大悲垂應本也以大悲故不住涅槃釋迦牟尼為人中日至宣說如是妙寶經典如來鑒機說法如日照物無所不徧為欲利益者準金光明力用須明十種利益云云善哉如來諸根寂滅至入於諸佛所行之處諸根寂滅者以了眼等性常具無減修諸惑死生悉已寂滅故常居寂定而復游入者將轉法輪表不妄說又三世佛說必須入定首楞嚴云雖知諸法常是定相而示眾生諸禪差別言善寂大城者正讚所入定也即經初法性三昧若入此定即能善了諸法寂滅無非法性防生死之非禦涅槃之敵是以中道善寂而名大城也此乃佛之境界故受清淨無垢之名為諸佛行處一切聲聞身皆空寂至一切眾生性相亦空如來三昧空智明見聲聞身果性相皆空諸佛境界亦空故云一切聲聞等如是一切等者指上自他依果國土淨穢推性推相不見差品一切眾生依正境界推求性相皆同真淨無復別異然推乎性相即空觀遣情顯理之要門也四句推性不見性四句推相不見相祇一妙空性相雙遣具如前說狂愚心故不能覺知上讚佛所游三昧空智徧了諸有差異悉皆泯亡唯真智獨存更無染異樹神明曉悲愍凡迷狂愚不了故請佛出定我常念佛樂見世尊至清冷法水以滅是火敘昔我常念佛者心游法界常照三身觀力未充欲求深證故助之以誓願加之以戀慕修之以大悲合掌雨淚皆助成常念之觀也世尊慈愍悲心無量至是故我今渴仰欲見樹神自昧如來上位真身故請佛加願使我身常得見佛復愍於他不見佛之真體故敘世尊常護一切是故渴仰欲見者即引己及他請佛現身聲聞之身猶如虗空至眾生之性如夢所見即樹神擊請今佛出定也如來在定明了性淨徹內徹外即寂即現其如眾生未發上定故樹神頻請出現發悟斯機乃舉六喻顯乎聲聞色體非性明體所證真理閴寂無知如虗空等皆非實性也眾生之性虗妄現在亦如夢所見都無實相如來行處淨如琉璃至如來行處微妙甚深正明佛所入定具慈愍照故請如來出定令我及眾得安樂故一切眾生無能知者至一切緣覺亦不能知樹神以凡夫小聖共迷佛所遊境界故請佛現身即令明見唯心佛現五通神仙者別舉人趣中有術成仙者發得五通雖有他心宿命而不知佛所遊定照理起應不離眾生心體無漏二乘雖有三明六通亦昧佛境唯心故曰亦不能知也我今不疑佛所行處惟願慈悲為我現身樹神述已於佛行處明了無滯雖知本無隱現上舉他眾共迷佛境實有動靜故敦請出定云惟願慈悲為我現身爾時世尊從三昧起以微妙音而讚歎言爾時者即樹神請畢之時佛酬其請示出定之相乃云以微妙音而讚歎言即微細妙好之音而悅四眾也問佛何處入定此云從三昧起答初將說經游於無量甚深法性今說將竟故從三昧起此經首尾皆在法性中說善哉善哉樹神善女至皆入甘露無生法門佛讚樹神意含前二是印成三番菩薩讚教以諸菩薩及妙幢能讚佛所說教皆是快言如來序品以來明大體大宗大用是金光明妙三法也故云快說是言若眾生聞此三法即能發解證悟明了常住故云入甘露無生法門耳金光明經卷第四金光明經感應記明鹽官安國寺比丘受汰重輯光明一經大藏具存三譯惟此北涼所翻文成四卷者其感應若桴鼓焉余自崇禎辛未冬日既集科注以疏解經王矣茲癸酉夏復念義理淵玄解入匪易倘其就一事而即能使人怖果修因遷善改惡則亦惟感應之說為得其要已於是即見聞所及聊錄數則附之卷末竝垂流布云敵國交歡漢沙門摩騰中天竺國人也美丰儀解大小乘經常以游化為任往天竺附庸小國講金光明經會敵國侵境騰曰經云能說此法為地神所護使所居安樂今鋒鏑方始曾是為益乎乃誓以忘身躬往和勸遂至二國交歡繇是顯譽豈非金光明經之力與江魚化隋天台智者大師居台州修禪寺開皇中率勵徒眾貨衣資什物就土民孔玄達等贖梁為放生池一時感化至捨魚梁五十五所甞於其上講金光明經忽一日法堂前見黃無數翔集半日悲鳴而去大師見之曰乃江魚化為黃來謝吾恩耳金人入夢隋釋彥琮趙郡柏人李氏子開皇年間駕東巡詔扈從時煬帝在晉邸出總河北旋途并部上謁講金光明經秦王俊鎮太原居其宅一夕夢人身金色長三丈餘授玻瓈酒碗曰可飲爾辭以律遮不敢至是見王所事像如之燈焰自續隋僧法純姓祝氏扶風始平人也住大興善寺日講金光明經嘗歎曰身命無常何可愛保檀供難消吾其行金光明懺法乎更四十五年不廢除飲食便利不出道場遂感燈無油而光𦦨相續者七晝夜或聞道場中有演說教授聲就視之則寂然忽一日閉室靜坐弟子惠進見白衣童子手捧金光明經侍立純右問曰此是何人答曰第六天頻來召我我以著樂妨於修道終不許也若無佛法處我則願生以化迷類久之雙鴿集於衣桁注目視純都無懼色春秋八十五無疾端坐念佛而終火化獲舍利無筭至心泉涌唐釋空藏住京師會昌寺誦金光明經三百餘卷說化為業遊涼川原有緣斯赴又往藍田負兒山誦經賷六斗擬為月料乃經三年日噉二升猶未能盡又感神鼎不知自何而來又至玉泉寺以為終焉之地時經亢旱泉竭合寺眾僧將散藏乃至心祈請泉即應時涌溢道俗動色驚歎不已詔講太極唐僧智聚俗朱姓出家蘇州虎山寺至德二年詔於太極殿講金光明經天子躬御法筵臣僚咸集於時雲興瓶瀉莫不歆艶黃翔集唐釋文舉婺州東陽人張氏子溫粹而玉動靜以時視聽之官有守言行尤謹此固律範之出於自然者嘗誦金光明經兼通法華金光明義疏化王天台至登講訓儔侶日填詔為國清寺主初智者大師嘗立金光明道場每年九月集四眾熏修懺法期滿七七當時檀施雲臻供養豐厚自大師之沒世亦變更道場寖以寂莫至是幾絕舉乃罄己衣資重建金光明道場檀施四遠復集感黃翱翔而來眾皆歎異舉曰金光明力也後知事僧清蘊謀之於舉置莊田十二頃以給金光明會飲食之費無疾示終唐釋廣修東陽留氏子居禪林寺日誦金光明經每歲建金光明懺法七七日後台州刺史韋珩迎講金光明經大義壽七十三無疾而終葬於金地道場門人良汶發而茶毗之獲舍利千餘顆天神擁衛唐釋玄䇿會稽魯氏子幼隨父賈至天台見鄉里為誦金光明經會盛甚蓋隋智者大師所創始也其法於每歲九月合遠近僧俗之眾無慮千萬人而䇿心獨偉之遂依禪林寺僧廣智師出家日誦金光明經一部修禮懺法始終不倦感天神常來聽法現形擁衛四遠檀那愈加信向大雨如注唐釋從禮襄陽人居台州平田精舍慎重莊默喜怒不形於色平居必虔誠持戒梁乾化年中夏旱知事僧以園蔬枯悴請禮祈禱遂誦金光明經未畢而大雨如注三日乃止四境霑足時武肅王錢氏聞之召入府建金光明懺法道場所得施利隨散寒暑惟一衲日惟一食常坐不臥世壽七十九無疾端坐念佛而逝火化收舍利無筭浮舟放生宋釋義寂溫州永嘉人姓胡氏太平興國年間居台州黃巖縣海門靈石寺昔智者冬居道場也眾請寂乘舟泛海講金光明經流水長者品放生以為常法寺為一新上聞之詔遣高品衛紹欽等入山重建壽昌寺為所在官僚請法受戒壽六十九無疾垂誡囑後事奄爾而化白光自出宋僧晤恩姑蘇常熟人也俗姓路母張氏夢僧入其室而娠孩童時見僧必迎拜年十三時聞誦阿彌陀經有所感悟因求出家漢開運間依錢塘慈光院志因師受天台三觀六即之說窮覈法華金光明等義日誦法華金光明經各一部雍熙三年八月朔中夜覩白光自出明滅不恒謂其徒曰吾報盡矣自是專念阿彌陀佛不輟忽夢祖師灌頂執金罏焚香三繞其室曰吾來迎汝及覺猶聞香氣馥郁面西端坐而化茶毗獲舍利無數天王聽法宋釋岑闍黎姓楊臨原人也戒行端謹布衣乞食於繖蓋寺西山泉側造誦經室誦金光明經三千餘部每誦經時感得四天王來擁護聽法凡施飯食鼠馴伏競來食噉竝無畏懼口齒不灰宋釋惟渥錢塘人也姓金氏幼年離俗即預法流立志深靜杜門謝事平生誦金光明經五千餘部念佛不輟所有善因莊嚴淨土臨終坐亡火化口齒不灰莊嚴淨土宋釋若觀湖州烏程縣烏鎮人也俗姓錢氏居嘉會院立行卓爾四方欽之嘗結緇素輩修行淨業其勸化牓云某伏念生死無際輪迴不息唯安養之歸則無退轉日誦金光明經一部始終不倦繫念阿彌陀佛晝夜不輟誓與法界眾生莊嚴淨土臨終趺坐茶毗獲舍利無數乘力遷職晉陳堯咨泊舟三山磯有老叟曰來日午有大風起舟行必覆宜避之來日天晴萬里無片雲舟人請解纜公曰更待同行舟一時離岸公托以事日午天色恬然俄黑雲起於天末大風暴至折木飛沙怒濤若山同行舟多沉溺公驚歎又見前叟曰某實非人乃沿江之遊奕將也以公他日當位宰相面當奉告公曰何以報德叟曰吾不求報貴人所至龍神禮當衛護願得金光明經一部某乘其力薄有遷職公許之至京以金光明經三部遣人詣三山磯投之夢前叟曰本祇祈一公賜以三今連陞數秩再拜而去伏法特原隋計詡任台州郡守開皇年中甞請智者大師於江上講金光明經流水品漁者聞法皆好生惡殺不復業漁詡後還都坐罪下獄臨當伏法詡遙祈大師伸一救護乃夜夢羣魚吐沫相濡明旦降勑特原詡罪集僧轉誦唐孔恪為遂州總管府記室參軍武德年中暴病卒一日而甦自說被二人引至一官府官問曰何故殺牛兩頭恪云不殺官曰汝教弟殺牛何謂不殺因呼恪弟弟死已數年矣既至形容枯槁官語之曰已追汝兄至矣初殺牛時誰之意也弟曰牛實某所殺兄不與焉官曰汝雖殺牛罪歸造意汝欲代兄受罪固是善事然冥司與陽間不同凡有罪者雖父子不容相代況弟兄乎恪曰彼時殺牛實某宴客故使弟殺之官語弟曰汝便無罪放汝受生言訖弟忽不見官又問恪云何復殺兩鴨恪曰前任縣令殺鴨供官客耳豈恪罪也官曰官客自有供無鴨汝何以鴨供之將以要譽非罪而何又問何故復殺雞卵六枚恪曰平生不食雞卵唯憶幼年九歲時寒食日母與雞卵六枚因煑食之官曰今欲推罪於母乎恪曰不敢但說其因耳此是恪殺之也官曰汝殺他命當自受之官遂命主司取恪善惡籍來觀之既而謂恪曰人生於世所作罪福冥司悉皆錄之如福多罪少先令受福如罪多福少先令受罪今汝殺生之罪如此汝一生善行略不見有福少惡多宜即受罪恪甚恐懼無以應對時有鬼卒數十竝在階下將欲執恪而去官顧主司曰更考此人壽命當盡否主司取籍視之對曰尚有七月壽命未盡官曰壽命盡日罪報尚在宜且放還語恪曰我更放汝歸七月可勤修福因遣卒送出復蘇恪乃大集僧眾轉誦金光明經修崇功德精勤懺悔至七月與眾辭訣俄而命終課經脫罪宋紹興年間淮陰民家喪其女經寒食節欲作佛事薦悼而無財其母截髮賣得錢六百出街請僧忽遇五僧過門迎接作禮告其故皆推避良久一僧始留曰適不擕經行能自假借否其母訪諸隣得金光明經以授僧方展卷母涕淚雨傾僧惻然有感曰吾當就市澡浴為汝盡誠看誦經畢具疏如法回向受嚫而去遇四僧於市索其所得錢邀往買酒已就座未及舉杯忽聞牕外有女聲叫號曰轉經僧莫吃酒我是看經家亡女也淪滯冥途日久今蒙師課經功德方得脫罪超生師若飲酒破齋令我依前沉墜言已不見僧慚而罷其後五僧謹持齋戒念佛看經皆證極樂賣莊造經宋鄧成豫章人也年二十餘忽暴死經三日蘇曰使者領至判官判官即成之表丈刺史公黃麟也見成悲喜具問家事成語丈人曰悉皆無恙成因哀求麟曰我亦欲得汝歸傳語於我諸弟遂入白王既出曰已論放汝言訖王出召成問曰汝在生作何罪業至有爾許冤對然筭猶未盡當得復還無宜更作地獄業也尋有畜生數十頭來噬成王謂曰鄧成已殺爾爾復殺鄧成無益之事我今放成回令為汝作功德皆使汝託生人間不亦善乎悉云不要功德但欲殺鄧成耳王曰如此於汝何益殺鄧成汝亦不離畜生之身曷若受功德即改為人身也諸畜多有去者唯一驢頻來𠴲成一狗囓其衣不肯去成曰為汝造金光明經四卷驢狗遂去王遣原追成吏送之出見麟鱗謂成曰至喜莫過重生汝今得還深足忻慶吾雖為判官然日日恒受罪汝且住此少當見之俄一牛頭卒持火來從麟頂上然至足麟遂成灰俄一卒持水噴之復生悲涕良久謂成曰吾之受罪如是不可忍也汝歸可傳語我諸弟努力為造金光明經四卷作諸功德令我得離此苦然非吾本物雖為功德終不得之吾先將官料置得一莊所今可貨此造佛經即當得脫或恐諸弟恍惚不信汝可持我玉簪還以示之因拔頭上簪與成麟前有一大水坑令成合眼推入坑中即活其父富於財喜其子重生數日之內為造金光明經作諸功德成既愈遂往黃氏家為說麟所託言造經事以玉簪還之黃氏識簪舉家悲泣數日乃賣莊宅為造金光明經臨流建講宋越州諸暨縣令潘華敬奉三寶勤誦佛經謹依天台智者教法每請僧臨于江湖上講金光明經流水長者品仍禁約不許諸人於江湖內捕魚是年奉詔還京夜夢江湖內魚化為人形者數萬號泣拜謝皆云相公去矣吾眾不免死矣華異之乃作夢魚記以囑後來宰邑者冤家自釋宋張居道滄州景城縣人任溫州治中未蒞職日因嫁女恣意屠宰猪羊禽獸之類未滿一旬忽得重病而死唯心尚暖經三日復活云初見四人來一人持棒一人執索一人持袋一人著青騎馬戴帽至門下馬懷中取文書一紙示居道乃是猪羊等同詞共訟居道其詞曰猪等雖前身積罪合受畜生之身配在世間年限未滿遂被居道枉將屠殺更歸畜生再遭刀杌有騎馬者即令從人縛居道去直行一道向北行至半路使人即語居道吾被差來時檢汝壽筭元未合死但坐汝殺生過多眾冤共訟今冤家盡在閻王殿前待汝居道聞之彌增驚怕告使人曰必作何計可解此冤對乎使人曰但能為所殺生命發願造金光明經四卷當得免脫居道自發願言願造金光明經四卷虔誠供養禮誦願冤家解釋少頃望見城門使人引向東入轉向北見閻王殿前無數罪人問辯答欵著枷被鎻杻手鐐足鞭撻狼藉哀痛叫號不忍聽聞使人即過狀閻王王曰急喚訴者來使人走出諸處巡問曹府咸悉稱無即帖五道大神撿化形案少時有一主者報云世人張居道為殺生故願造金光明經四卷依科其所遭殺者竝合乘此功德化生善道王乃語居道曰再歸生路當宜念善多修功德遣人送出城如從夢歸後居道發心造金光明經四卷合家大小戒葷止殺終身行善勸化百餘人斷肉止殺持誦此經冤化為人宋溫州安固縣縣丞妻染病經年不瘥獨自狂言口中叫痛叩頭狀有所訴治中張居道聞之為丞言曰如此之狀多是冤家所苦皆緣殺害生命之過可急為造金光明經請僧轉誦求哀懺悔病可却縣丞遵其教即便請人書寫未畢妻便醒悟云似夢中常有猪羊鵞鴨之類每日三次競來囓噬痛不可忍後皆化為人身來與我別云雖是冤家遭汝屠宰今汝為我敬造金光明經功德所以令我得化為人今咸解散不復相尋矣言訖即去病亦漸瘥由是溫州一郡家家斷殺人人向善雖因居道之指示實金光明經之力宏大也得經受生宋張龍圖無盡張公之子也有僕舟行見婦人行岸上提一油缾僕熟視之乃家故婢招喜也呼之不應而行愈疾停舟追及而問之婦人遙指岸側一古木曰吾居於是復問用油何為曰吾遍體創裂藉以膏潤則痛少差耳因謂僕曰郭門外精舍老僧戒行嚴潔每日持誦金光明經若為我誦十部以資冥福當即往生也僕歸為訪僧誦經還過其處擊木呼之見白衣叟自木穴中出曰招喜得經已受生矣煩公為我誦十部僕方問爾何人忽不見天王救難宋崔紹從其父直宦遊南海其家甞奉事一天王甚謹隣家李氏蓄一母猫甞往來紹家捕鼠南土風俗惡他舍之猫產其家以為不祥李之猫產二子於紹家紹甚惡之因命家僮縶三猫盛於筐以繩固筐口加之以石沉之於江後不逾月紹忽得熱病一夕遂重忽見二人手執文帖云奉命追公紹云平生履善不省為惡今有何事被此追乎二人曰公殺無辜三人冤家上訴遂展帖示紹文字分明紹頗畏懼頃刻間見一神人來使者俯伏禮敬神謂紹曰爾識我否紹曰不識神曰我爾奉侍天王也常為汝供養久矣今爾有難特來相救紹拜伏求救天王曰爾但共我行必無憂患天王遂行紹隨之使者押紹于後至一官府天王先入使者先引紹見判官判官顧紹曰爾筭未盡判官領紹見大王大王與天王對坐大王曰有冤家訴汝手雖不殺口中處分令投於江中大王令喚崔紹冤家來少頃有一判官領一婦人至兼領二子皆人身猫首號泣不已稱紹非理相害天王向紹言速開口與作功德紹遂發願各寫金光明經一部言訖不見婦人大王曰汝既能作是功德又陽壽未盡且放汝還紹拜大王而回紹與天王同歸行至半路見四人皆人身而魚首臨一峻坑立泣拜謂紹曰性命危急欲墮此坑非公不能相活紹曰僕何力以救公四人曰公但許諾則得紹曰灼然四人拜謝又云性命已蒙公放訖更欲啟難發之口有無厭之求肯許之乎紹曰但力可及者盡力而應之四人曰懇公寫金光明經一部則度脫罪身矣紹復許之言畢四人不見却見本身偃臥於牀以被蒙覆手足天王曰此則公身也但徐徐入之莫懼如天王言入本身便蘇問家人死已三日矣惟胸及口鼻微暖蘇後一日許猶依稀見天王在眼前又見階前水盆中蓄四鯉魚紹問此魚何來家人曰本買充廚膳以君疾亟不及修理紹曰得非臨坑四人乎遂命投之於陂池中即發願寫金光明經四卷以酬解冤之誓自是合家不殺生命蔬食齋戒持誦金光明經終日勸人念佛行善矣光明入室宋秦氏淨堅家松江厭惡女身精持齋戒每日誦金光明經一部禮佛千拜久之有光明入室面西念佛安坐而化
